body:
  text: 詩𫝊遺說卷一宋朱鑑編綱領舜典帝曰夔命汝典樂教胄子直而溫寬而栗剛而無虐簡而無傲詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和胄長也自天子至卿大夫之適子也栗莊敬也凡人直者必不足於溫故欲其溫寬者必不足於栗故欲其栗皆所以因其德性之善而輔翼之也剛者必至於虐故欲其無虐簡者必至於傲故欲其無傲皆所以防其氣禀之過而矯揉之也所以教胄子者欲其如此而所以教之之具則又専在於樂如周禮大司樂掌成均之法以教國子弟而孔子亦曰興於詩成於樂蓋所以蕩滌邪穢斟酌飽滿動蕩血脉流通精神養其中和之德而救其氣質之偏者也心之所之謂之志心有所之必形於言故曰詩言志既形於言則必有長短之節故曰歌永言既有長短則必有髙下清濁之殊故曰聲依永聲者宫商角徴羽也大抵歌聲長而濁者為宫以漸而清且短則為商為角為徴為羽所謂聲依永也既有長短清濁則又必以十二律者和之乃能成文而不亂假令黃鍾為宫則太蔟為商姑洗為角林鍾為徴南吕為羽蓋以三分損益隔八相生而得之餘律皆然即禮運所謂五聲六律十二管還相為宫所謂律和聲也人聲既和乃以其聲被之八音而為樂則無不諧協而不相侵亂失其倫次可以奏之朝廷薦之郊廟而神人以和矣聖人作樂以養情性育人材事神祗和上下其體用功效廣大深切如此今皆不復見矣可勝歎哉文集書說今見詩𫝊而此注說為詳論語子曰吾自衛反魯然後樂正雅頌各得其所魯哀公十一年冬孔子自衛反魯是時周禮在魯然詩樂亦頗殘缺失次孔子周流四方參互考訂以知其說晚知道終不行故歸而正之集注下同子所雅言詩書執禮皆雅言也雅常也執守也詩以理情性書以道政事禮以謹節文皆切於日用之實故常言之嘗獨立鯉趨而過庭曰學詩乎對曰未也不學詩無以言鯉退而學詩事理通達而心氣和平故能言子曰興於詩立於禮成於樂興起也詩本性情有邪有正其為言說既易知而吟咏之間抑揚反復其感人又易入故學者之初所以興起其好善惡惡之心而不能自已者必於是而得之案內則十歲學幼儀十三學樂誦詩二十而後學禮則此三者非小學傳授之次乃大學終身所得之難易先後淺深也程子曰天下之英才不為少矣特以道學不明故不得有所成就夫古人之詩如今之歌曲雖閭里童稚皆習聞之而知其說故能興起今雖老師宿儒尚不能曉其義况學者乎是不得興於詩也子曰小子何莫學夫詩詩可以興感發至意可以觀考見得失可以羣和而不流可以怨怨而不怒邇之事父逺之事君人倫之道詩無不備二者舉重而言多識於鳥獸草木之名其緒餘又足以資多識學詩之法此章盡之讀是經者所宜盡心也子曰誦詩三百授之以政不逹使於四方不能専對雖多亦奚以為専獨也詩本人情該物理可以驗風俗之盛衰見政治之得失其言溫厚和平長於風諭故誦之者必逹於政而能言也程子曰窮經將以致用也世之誦詩者果能從政而専對乎然則其所學者章句之末耳此學者之大患也子曰起豫者商也始可與言詩已矣孔子曰繪事後素而子夏曰禮後乎可謂能繼其志矣非得之言意之表者能之乎商賜可與言詩者以此若夫玩心於章句之末則其為詩也固而已矣謝氏曰子貢因論學而知詩子夏因論詩而知學故皆可與言詩並同上今見詩傳而注說小不同故備載之後放此孟子咸丘蒙問曰詩云普天之下莫非王土率土之濵莫非王臣而舜既為天子矣敢問瞽瞍之非臣如何孟子曰是詩也非是之謂也勞於王事而不得養父母也曰此莫非王事我獨賢勞也故說詩者不以文害辭不以辭害志以意逆志是為得之如以辭而已矣雲漢之詩曰周餘黎民靡有孑遺信斯言也是周無遺民也詩小雅北山之篇也普遍也率循也此詩今毛氏序云役使不均已勞於王事而不得養其父母焉其詩下文亦云大夫不均我從事獨賢乃作詩者自言天下皆王臣何為獨使我以賢才而勞苦乎非謂天子可臣其父也文字也辭語也逆迎也雲漢大雅篇名也孑獨立之貌遺脫也言說詩之法不可以一字而害一句之義不可以一句而害設辭之志當以已意迎取作者之志乃可得之若但以其辭而已則如雲漢所言是周之民真無遺種矣惟以意逆之則知作詩者之志在於憂旱而非真無遺民也集注今詩傳經文同而注闕二禮春秋有制度之難明本末之難見放下未要理㑹亦得如書詩直是不可不先理㑹又只如詩之名數書之盤誥恐難理㑹且先讀典謨之書雅頌之詩何嘗一言一句不說道理何嘗深潜諦玩無有滋味只是人不曽子細看若子細看裏面有多少倫序須是子細參研方得此便是格物窮理襲蓋卿録論孟用二三年工夫看亦須兼看大學及書詩所謂興於詩諸經諸史大抵皆不可不讀廖德明録大學中庸有箇準則讀著便令人識蹊徑詩又能興起人意思皆易看萬人傑録聖人教人自詩禮起如鯉趨過庭曰學詩乎學禮乎詩是吟咏性情感發人之善心禮使人知得箇定分這都是切身工夫如書亦易看大綱亦似詩華賀孫録讀書如論孟是直說日用眼前事文理無可疑先儒說得雖淺却别無穿鑿壞了處如詩易之類則為先儒穿鑿所壞使人不見當來立言本意此又是一種工夫直是要人虛心平氣本文之下打疊交空蕩蕩地不要留一宗先儒舊說莫問他是何人所說所尊所親所憎所惡一切莫問而唯本文本意是求則聖賢之指得矣若於此處先有私主便為所蔽而不得其正此夏蟲井蛙所以卒見笑於大方之家也答吕祖儉書問子所雅言詩書執禮曰古之為儒者只是習詩書禮樂言執禮則樂在其中如易則掌於太卜春秋掌於史官學者兼通之不是正業只這詩書大而天道之精微細而人事之曲折無不在其中禮則節文法度聖人教人亦只是許多事沈僴録陳文蔚問興於詩與游藝先後不同如何曰興立成是言其成志據依游是言其用功處但詩較感發人故在先禮則難執守須是常常執守得樂則如太史公所謂動蕩血氣流通精神者所以涵養前所得也黃義剛録又魏椿録云興於詩此三句上一字謂成功而言也只是這一心更無他說興於詩興此心也立於禮立此心也成於樂成此心也今人讀詩是興起得箇甚麼沈僴録孔子當時教人只說詩書執禮只說學詩乎與興於詩立於禮成於樂只說人而不為周南召南詩三百一言以蔽之曰思無邪黃義剛録問興於詩立於禮成於樂曰興於詩便是箇小底立於禮成於樂便是箇大底興於詩初間只是因他感發興起得來到成處却是自然後恁地又云古人自少時習樂誦詩學舞不是到後來方始學禮學詩學樂如云興於詩立於禮成於樂非是初學有許多次第乃是到後來方能如此不是說用工夫次第乃是得效次第如此到得成於樂是甚次第幾與理為一看有甚放僻邪侈一齊都滌蕩得盡不留些子興於詩是初感發這些善端起來到成於樂是刮來刮去凡是有毫髮不善都滌蕩得盡了這是甚氣象葉賀孫録徐㝢問立於禮猶可用力詩今難曉樂又無何以興成乎曰今既無此家具只有理義在只得就理義上講究如分别是非到感慨處有以興起其善心懲創其惡志便是興於詩之功也涵養和順無斯須不和不樂恁地和平便是成於樂之功也如禮今亦無只是硬造些規矩自恁地收斂古人此身終日都在禮之中不由自家古人興於詩猶有言語可以諷誦禮全無說話只是恁地做去樂更無說話只是聲音節奏使人聞之自然和平陳淳録看詩不要死殺看了看了見得無所不包今人看詩無興底意思甘節録詩可以興須是反復熟讀使書與心相乳入自然有感發處李閎祖録孔子曰詩可以興可以觀可以羣可以怨邇之事父逺之事君多識於鳥獸草木之名那上面六節固是當理㑹若鳥獸草木之名何用自家知之但是既為人則於天地之間物理須要都知得方可黃義剛録問詩如何可以興曰讀詩見其不美者令人羞惡見其美者令人興起甘節録讀詩便長人一格如今人讀詩何緣㑹長一格詩之興處最不緊要然興起人處正在興㑹得詩人之興便有一格長豐水有芑武王豈不仕蓋曰豐水且有芑武王豈不有事乎此亦興之一體不必更注解如龜山說關雎處意亦好然終是說死了如此便詩眼不活吳必大録問詩可以觀集注云考見得失是自已得失否曰是考見事迹之得失因以警自已之得失又問可以怨集注云怨而不怒怒是如何曰詩人怨詞委曲柔順不恁地疾怨吕德明録大凡讀書多在諷誦中見義理況詩又全在諷誦之功所謂清廟之瑟一唱而三歎一人唱之三人和之方有意思如今詩曲若只讀過也無意思須是歌唱起來方見好處因說讀書須是有自得處到自得處說與人也不得如熹舊讀仲氏任只其心塞淵終溫且惠淑慎其身先君之思以朂寡人既破我斧又缺我斨周公東征四國是皇哀我人斯亦孔之將伊尹曰先王肇修人紀從諫弗咈先民時若居上克明為下克忠與人不求備檢身若不及以至於有萬邦兹惟艱哉如此等處直為之廢卷慨想而不能已覺得朋友閒看文字難得這般意思熹二十嵗前後已看得書大意如此如今但較精密日月易得匆匆過了五十來年錢木之録下同讀詩惟是諷誦之功上蔡亦云詩須是謳吟諷誦以得之熹舊時讀書也只先去看許多注解少間却被惑亂後來讀至半了却只將詩來諷誦至四五十過已漸漸得詩之意却去看注解便覺減了五分以上工夫更從而諷誦四五十過則胸中豁然矣詩如今恁地注解了自是分曉易理㑹但須是沉潜諷誦玩索義理咀嚼滋味方有所益若只章章看過一部詩只三兩日可了但不得滋味也記不得全不濟事古人說詩可以興須是讀了有興起處方是讀詩若不能興起便不是讀書因說永嘉之學只是要立新巧之說少間指摘東西鬭凑零碎便立說去縱說得是也只無益莫道又未是並同上讀書之法既先識得他外面一箇皮殼了又須識得他裏面骨髓方好如公看詩只是識得箇模象如此他裏面好處全不曽見得自家此心都不曽與他相黏所以眊燥無汁漿如人開溝而無水如此讀得何益未論讀古人詩且如讀近世名公詩也須知得他好處在那裏如何知得他好處亦須吟哦諷詠而後得之今人都不曽識好處也不識不好處也不識不好處以為好者有之矣好者亦未必以為好也其有知得某人詩好某人詩不好者亦只是見已前人如此說便承虛接響說取去如矮子看戲相似他見人道好他也說好及至問著他那裏是好處他元不曽識舉世皆然只是不曾熟讀熟讀後自然見得人而不為周南召南其猶正牆面而立也歟今公讀二南了還能不正牆面而立否意思都不曽相黏濟得甚事前日所舉韓退之蘇明允二公論作文處他都是下這般工夫實見得那好處方做出這般文章他都是將三代以前文字熟讀後故能如此沈僴録下同讀詩之法且如白華菅兮白茅束兮之子之逺俾我獨兮蓋言白華與茅尚能相依而我與子乃相去如此之逺何哉又如倬彼雲漢為章于天周王夀考豈不能作人也上兩句皆是引起下面說略有些意思傍著不須深求只如此讀過便得看詩且看他大意如衛之諸詩其中有說時事者固當細考如鄭之淫亂底詩苦苦搜求他有甚意思一日看五六篇可也看詩須是看他詩人意思好處是如何不好處是如何看他風土看他風俗又看他人情物態只看伐檀詩便見得他一箇清髙底意思看碩鼠詩便見他一箇暴斂底意思好底意思是如此不好底是如彼看他好底意思令自家善意油然感動而興起看他不好底自家心下如著槍相似如此看方得詩意讀書之法只是熟讀涵泳自然和氣從胸中流出其妙處不可得而言不待安排措置務自立說只恁平讀著意思自足須是打疊得這心光蕩蕩地不立一箇字只管虛心讀他少間推來推去自然推出那箇道理所以說以此洗心便是以這道理盡洗去那心裏物事渾然都是道理上蔡曰學詩須先識得六義體面而諷味以得之此是讀詩之要法看來書只是要讀讀得熟時道理自見切忌先自布置立說先生問學者誦詩每篇誦得幾遍對曰也不曽記只覺得熟便止曰便是不得須是熟讀了文義都曉得了却涵泳讀取百來遍方見得那好處那好處方出方見得精怪見公每日說得來乾燥元來不曽熟讀若讀到精熟時意思自說不得如人下種子既下得種子了須是討水去灌溉他討糞去培㙲他與他耘鋤方正是下工夫養他處今却只下得箇種子了便休都無耘治培養工夫如人相見才見了便散去都不曽交一談如此何益所以意思都不生與自家都不相入都恁地乾燥這箇貪多不得讀得這一篇恨不得常熟讀此篇如無那第二篇方好而今只是貪多讀第一篇了便要讀第二篇讀第二篇了便要讀第三篇恁地不成讀書此便是大不敬須是殺了那走作底心了方可讀書讀詩正在於吟咏諷誦觀其委曲折旋之意如吾自作此詩自然足以感發善心今公讀詩只是將已意去包籠他如做時文相似中間委曲周旋之意盡不曽理㑹得濟得甚事若如此看只一日便可看盡何用逐日只捱得數章而又不曽透徹邪且如人入城郭須是逐街坊里巷屋廬臺榭車馬人物一一看過方是今公等只是外面望見城是如此便說我都知得了如鄭詩雖淫亂然出其東門一詩却如此好又如女曰雞嗚一詩意思亦好讀之真有不知手之舞之足之蹈之者陳文蔚說詩先生曰謂公不曉文義則不得只是不見那妤處正如公適間說窮理也知事事物物皆具此理隨事精察便是窮理只是不見所謂好處所謂民生日用而不知所謂小曉得而大曉不得這箇便是大病熹也只說得到此要公自去㑹得又曰大凡物事須要說得有滋味方見有功而今隨文解義誰人不解須要見古人好處如昔人賦梅云疏影橫斜水清淺暗香浮動月黃昏這十四字誰人不曉得然而前輩直恁地稱歎說他形容得好是如何這箇便是難說須要自得他言外之意始得須是看得他物事有精神方好若看得有精神自是活動有意思跳擲呌喚自然不知手之舞足之蹈這箇有兩重曉得文義是一重識得意思好處是一重若只是曉得外面一重不識得他好底意思此是一件大病如公看文字都是如此且如公看詩自宣王中興諸詩至節南山公於其他詩都說來中間有一詩最好如白駒是也公却不曽說這箇便見公不曽看得那物事出謂之無眼目若是具眼底人此等詩如何肯放過只是看得無意思不見他好處所以如此又曰須是踏翻了船通身都在那水中方看得出先生問學者曰公看詩只看集傳全不看古注對曰意欲先看了先生集𫝊却看諸家解曰便是不如此無却看底道理才說却理㑹便是悠悠語今見看詩不從頭看一過云且等我看了一箇了却看那箇幾時得再看如厮殺相似只是殺一陳便了不成說今夜且如此厮殺眀日又重殺一番並同上吳必大請教曰先易後詩可否曰不若先詩後易觀詩之法且虛心熟讀尋繹之不厭被舊說黏定看得不活伊川解詩亦說得義理多了詩本是恁地說話一章言了次章又從而歎詠之雖别無義理而意味深長不可於名物上尋義理後人往往見其言只如此平淡只管添上義理却窒塞了他如一源清水只管將物事堆積在上便壅溢了熹觀諸儒之說唯上蔡云詩在識六義體面却諷詠以得之深得詩之綱領他人所不及所謂以意逆志者逆如迎待之意若未得其志只得待之如需于酒食之義後人讀詩便要去捉將志來以至束縛之吕氏說記有一條收數說却不定云此詩非詩本意然自有箇安頓用得他處今一槩存之正如一多可底人來底都是如所謂要識人情之正夫詩可以觀者正謂其間有得有失有黑有白若都是正却無可觀今不若且置小序於後熟讀正文為善如拾得一詩其間說香說白說寒時開雖無題目其為梅花詩必矣吳必大録讀詩且只將做如今人做底詩看或令人誦讀却從㫄聽之其訓詁有未通者略檢注解看却時時誦其本文便見其語脉所在又曰念此一詩既已記得其語却逐箇字將前後一樣字通訓之今注解中有一字而兩三義者如假字有云大者有云至者只是隨處旋紐捻非通訓也同上問先生授以詩𫝊且教誨之曰須是熟讀嘗熟讀一二篇未有感發竊謂古人教人兼以聲歌之漸漸引迪故最平易又疑鄭衛之諸詩皆淫聲小學之功未成而遽教以淫聲恐未能使之知戒而適以動其心志否抑其聲哀思怨怒自能令人畏惡故雖小子門人亦知戒乎今欲令弟姪輩學詩尚疑此未敢曉以文義合曰詩且逐篇旋讀方能旋通訓詁豈有不讀而自能盡通訓詁之理乎讀之多玩之久方能漸有感發豈有讀一二遍而便有感發之理乎古之學詩者固有待於聲音之助然今已亡之無可奈何只得熟讀而從容諷詠之耳若疑鄭衛不可為法即且令學者不必深究而於正當說道理處子細端詳反復玩味應不枉費工夫也答朱飛卿書如孟子說詩要以意逆志是為得之逆者等待之謂也如前途等待一人未來時且須耐心等待將來自有來時候他未來其心急切又要進前尋求却不是以意逆志是以意捉志也如此只是牽率古人言語入自家意中來終無益余大雅録先生問看詩如何對曰方看得關雎一篇未有疑處曰未要去討疑處只熟看熹注得訓詁字字分明便却玩索涵泳方有所得若便要立議論往往裏面曲折其實未曉只髣佛見得便自虛說耳恐不濟事此是三百篇之首可更熟看潘時舉録看詩須是吟詠教浹洽骨髓方得今都未曽看他皮毛在熹以前是看了多少詩說今只有一本解了不勞討解别看省了多少事如何更不去熟讀楊與立編語略下同須是先將那詩吟詠四五十遍了方可看注看了又吟詠三四十遍便意思自然融液浹洽方有見處看詩不須著意去裏面分解但是平平地涵泳自好歌詠之際深足以養人情性讀詩逐人自去看自有㑹心處看詩義理外更好看他文章注同上㬊淵問誦詩三百何以見其必逹於政曰其中所載可見有如小夫賤𨽻閭巷之間至鄙俚之事君子平日耳目所不曽見聞者其情狀皆可因此而知之而聖人所以修德於已施於事業者莫不悉備於其間所載之美惡讀誦而諷詠之如是而為善如是而為惡吾之所以自修於身者如是是合做底事如是是不合做底事待得施以治人如是而當賞如是而當罰莫不備見如何而政不逹若讀詩而不逹於政則是不曽讀也又問如何使於四方必能専對曰於詩有得必是於應對言語之間委曲和平葉賀孫録問刪詩果只是許多如何曰那曽得見聖人執筆刪那箇存這箇也只得就相𫝊上說去同上孔子取詩只取大意三百篇詩也有㑹做底有不㑹做底如君子偕老詩子之不淑云如之何此是顯然譏刺他了到第二章已下又全然放寬了豈不是亂道如載馳詩煞有首尾委曲詳盡非大段㑹底說不得又如鶴鳴做得極巧更含蓄意思全然不露如清廟一唱三歎者人多理㑹他不得注下分明說一人倡之三人和之譬如今人挽歌之類今人解者又須要胡說亂說錢木之録先生問林夔孫看詩到何處對曰至大雅曰公前日方看節南山如何恁地快恁地不得今人看文字敏底一揭開版便曉但於意味却不曽得便只管看詩也只是恁地但百遍自是强五十遍時二百遍自是强一百遍時題彼脊鴒載飛載鳴我日斯邁而月斯征夙興夜寐無忝爾所生這箇看詩也只是恁地但裏面意思却有說不得底解不得底意思却在說不得底裏面黃義剛録所論經指頗覺支蔓如云維清一篇又周禮之所寓此等議論又支蔓之尤甚者只似時文如此即我將亦周禮之所寓矣太皥陶唐之祀一旦廢絶固足以見世衰道喪之證然其未泯則於世道却未能大有所扶助如胡致堂兄弟極論關雎専美后妃之不妒忌而以獨孤亡隋為證熹嘗論之以為妒忌之禍固足以破家滅國而不妒忌之美未足以建極興邦也此等處恐皆是道理太多隨語生解要須滌除令胸次虛眀直截然後真箇道理方始流行不至似此支蔓勞攘徒為心害有損無益也詩說鄙意雖未必是然看子約議論如此自是無緣得契合更請打併了此一落索後看却須有㑹心處也答吕祖儉書詩曲盡人情方其盛時則作之於上東山是也及其衰世則作之於下伯兮是也精舍朋友雜記問詩次序是合當如此否曰也不見得只是如楚茨信南山甫田大田諸詩元初却當作一片又曰如卷阿說豈弟君子自作賢者如泂酌說豈弟君子自作人君大抵詩中有可以比併看底有不可如此看自有這般樣子卷阿詩與集傳不同葉賀孫録看易底不去理㑹道理却只去理㑹上下繫次序譬如讀詩者不去理㑹那四字句押韻底却去理㑹那十五國風次序相似㬊淵録或問詩先生曰詩幾年埋沒著被熹取得出來楊與立編語略先生於詩𫝊自以為無復遺恨曰後世若有揚子雲必好之矣沈僴録吕居仁春秋亦甚明白如熹詩說相似楊道夫録詩𫝊只得如此說不容更著語工夫却在讀者吳必大録問詩如何看曰看古說了方參看熹說彼此互參考得失待攻擊後方講得明古說只是吕氏載得詳偹黃顯子録詩𫝊中言姑從或云且從其說之類皆未有所考而不免且用其說李方子録詩中頭項多一項是音韻一項是訓詁名件一項是文體若逐一根究然後討得些道理否則殊不濟事須是通悟者看方得李閎祖録凡說詩者固當句為之釋然亦但能見其句中之訓詁字義而已至於一章之內上下相承首尾相應之大指自當通全章而論之乃得其意楚辭辨證熹當時解詩時且讀本文四五十遍已得六七分却看諸人說與我意思如何大綱都得之又讀三四十遍如此却義理流通自得矣楊與立編語略因學者解詩曰熹舊時看詩數十家之說一一都從頭記得初間那裏敢便判斷那說是那說不是看熟久之方見得這說似是那說似不是或頭邊是尾說不相應或中間數句是兩頭不是或尾頭是頭邊不是然也未敢便判斷疑恐是如此又看久之方審得這說是那說不是又熟看久之方敢決定斷說這說是那說不是這一部詩并諸家解都包在肚裏公而今只是見已前人解詩便也要注解更不問道理只認捉看便據自家意思說於已無益於經有害濟得甚事凡先儒解經雖未知道然其盡一生之力縱未說得七八分也有三四分且須詳讀熟究以審其是非而為吾之益今公才看著便妄生去取肆以已意是發明得箇甚麼道理公且說人之讀書是要將作甚麼用所貴乎讀書者是要理㑹這箇道理以反之於身為我之益而已沈僴録歐陽公有詩本義二十餘篇煞說得有好處有詩本末論又有論云何者為詩之本何者為詩之末詩之本不可不理㑹詩之末不理㑹得也無妨其論甚好近世自集注文字出此等文字都不見有了也害事如吕伯恭讀詩記人只是看這箇他上面有底便看無底更不知看了同上子由詩解好處多歐公詩本義亦好錢木之録因言歐陽詩本義而曰禮義大本復明於世固周程之功然近世諸儒亦為有助舊來儒者談經不越乎注疏而已至孫明復劉原父及永叔始自出議論如李泰伯文字亦自好蓋是運數將開此理復將明於世故耳蘇明允說歐陽子之文處形容得甚好近因觀其奏議如論回河劄子皆說得盡誠如老蘇所論詩義中辨毛鄭處文辭徐緩而其說直到底不可易吳必大録程先生詩𫝊取義太多詩人平易恐不如此楊與立編語略橫渠云置心平易始知詩然橫渠解詩多不平易萬人傑録吳必大所記云橫渠解悠悠蒼天此何人哉却不平易南軒精義是意外說却不曽說得詩中木意惟上蔡說須先識得六義體面而諷詠以得之此却是㑹讀詩楊與立編語略東萊說詩忒煞巧詩正怕如此看古人意思自寬平何嘗如此纎細拘迫同上陳君舉兩年在家中解詩未曽得見近有人來說君舉解詩凡詩中所說男女事不是說男女皆是說君臣未可如此一律今人解經先執偏見類如此邵告别録李善注文選中多有韓詩章句嘗欲寫出李閎祖録王通欲取曹劉沈謝之詩為續詩曹劉沈謝又那得一篇如鹿鳴四牡大明文王關雎鵲巢亦有學為四句古詩者但多稱頌之辭言不過實不足取信沈僴録教小兒讀詩不可破章楊道夫録問詩𫝊中有音未備者有訓未備者有以經統𫝊舛其次者答曰此類皆失之不詳今當添入然印本已定不容增減矣不免别作補脫一卷附之辨說之後此間亦無精力辦得只煩伯豐為編集其例如後詩集𫝊補略周南樛木樂只音止二字合附本字下鄘載馳無我有尤尤過也三字合附衆人字下無以我為有過雖爾八字合附大夫君子字下王中谷有蓷遇人之不淑矣淑善也三字合移在歎矣字下以上略見條例餘皆依此且用草紙寫來恐有已添者却刪去也又黎黑也古語黎元猶秦言黔首桑柔篇中第二章注中已略言之孟子首篇亦嘗有解今若天保篇中未解可采用其說者於補脫卷中却刪去桑柔篇注或但略言之亦可也更詳之答吳必大書後已改入印本讀詩甚善所諭亦有條理但不必如此先立凡例但熟讀平看從容諷詠積久當自見得好處也同上真蹟今並藏吳氏詩傳遺說卷一
