body:
  text: 詩傳遺說卷五宋朱鑑編雅吕伯恭讀詩記引鄭氏詩譜曰小雅十六篇大雅十八篇為正經孔穎逹曰凡書非正經者謂之傳未知此傳在何書也案楚辭屈原離騷謂之經自宋玉九辨以下皆謂之傳以此例考之則六月以下小雅之傳也民勞以下大雅之傳也孔氏謂凡非正經者謂之傳異矣又謂未知此傳在何書則非也楚辭辨證問先生詩集傳分詩之經詩之傳何也曰此得之於吕伯恭風雅之正則為經風雅之變則為傳如屈平之作離騷騷即經也如後人作反騷與夫所謂九辨之類則為傳耳周謨録問二雅所以分曰小雅是所繫者小大雅是所繫者大呦呦鹿鳴其義小文王在上於昭于天其義大問變雅曰亦只是變用他腔調爾余大雅録問大雅小雅或謂言政事及道故謂之大雅止言政事故謂之小雅竊恐不可如此分别答曰如此分别固非是然但謂不可分别則二雅之名又何以辨耶答熊夢兆伊川有詩解數篇說到小雅以後極好蓋是王公大人好生地做都是識道理人言語故他裏面說得儘有道理好子細看非如國風或出於婦人小夫之口但可觀其大槩也董銖録小雅恐是燕禮用之大雅須饗禮方用小雅施之君臣之間大雅則止人君可歌吳必大録大雅非聖賢不能為其間平易明白正大光明同上孟子曰王者之迹熄而詩亡詩亡然後春秋作王者之迹熄謂平王東遷而政教號令不及於天下也詩亡謂黍離降為國風而雅亡也春秋魯史記之名孔子因而筆削之始於魯隱公之元年實平王之四十九年也王者之迹熄而詩亡詩亡然後春秋作這道理緊要在王者之迹熄一句上蓋王者之政存則禮樂征伐自天子出故雅之詩作於上自王者之迹熄則禮樂征伐不自天子出故雅之詩不復作於上而詩降而為國風是以孔子作春秋以定天下之邪正為百王之大法也吕德昭録沈僴問詩亡然後春秋作先儒謂自東遷之後黍離降為國風而雅亡矣恐是孔子刪詩之時降之曰亦是他當時自如此要識此時便如周南召南當初在鎬豐之時其詩為二南後來在洛邑之時其詩為黍離只是自二南進而為二雅自二雅退而為王風二南之於二雅便如登山到得黍離時節便是下坡了陳文蔚録大雅氣象閎闊小雅所陳雖各止一事然說得亦自精切至到嘗觀左傳以工歌宵雅之三為重近因除夜課孫輩誦之見其詩果為懇至鹿鳴之詩則見其賔主相好之誠所謂德音孔昭以燕樂嘉賔之心情意懇切而不失義理之正四牡之詩注云無公義非忠臣也無私恩非孝子也如云王事靡盬又云不遑將母皆是人情少不得底皇皇者華首章言每懷靡及其後便須咨詢謀度看此三詩雖不用小序意義自明白吳必大録潘時舉問鹿鳴四牡皇皇者華三詩儀禮皆以為上下通用之樂不知如君勞使臣謂王事靡盬之類庶人安得而用之曰鄉飲酒亦用而大學始教宵雅肄三觀其始也正謂習此蓋入學之始須教他便知有君臣之義始得又曰上下常用之樂小雅如鹿鳴以下三篇及南有嘉魚魚麗南山有臺三篇風則是關雎卷耳采蘋等篇皆是然不知當初何故獨取此數篇也潘時舉録潘時舉說棠棣詩答曰雖有兄弟不如友生未必其人實以兄弟為不如友生也猶言喪亂既平之後乃謂兄弟反不如友生乎蓋疑而問之辭也同上中庸詩曰妻子好合如鼓瑟琴兄弟既翕和樂且耽冝爾室家樂爾妻孥子曰父母其順矣乎鼓瑟琴和也翕亦合也耽亦樂也孥子孫也夫子誦此詩而贊之曰人能和於妻子冝於兄弟如此則父母其安樂之矣章句聖人之言自是精粗輕重得冝吕伯恭棠棣詩章說聖人之言大小髙下皆冝而左右前後不相悖此句說得極好董銖録問伐木大意皆自言待朋友之不可不加厚之意所以感發之也曰然又問釃酒𤣥縮酌用茅是此意否曰恐茅乃以酹酒古人芻狗乃酹酒之物則茅之縮酒乃今以醡酒也想古人不肯用縮帛故以茅縮酒也揚道夫别録神之聽之終和且平先生曰若能盡其道於朋友雖鬼神亦必聽之相之而錫之以和平之福吕德昭録古人縮酒用茅非謂祭時以縮酌求神也看禮記特牲篇縮酌用茅注謂泲之以茅縮去滓也詩伐木有酒湑我注云湑莤之也王有酒則泲莤之與左傳縮酒同義謂以茅泲之而去其糟也如今人或以器或以布帛去酒之滓然劉砥録問天保上三章天以福錫人君四章乃言其先君先亦錫爾以福五章言民亦遍為爾德則福莫大於此矣故卒章事言之曰然楊道夫别録潘時舉說天保詩云第一章第三章皆人臣頌祝其君之言然辭繁而不殺者以其愛君之心無已也至四章則以祭祀王公為言五章則以遍為爾德為言蓋謂人君之德必上無愧於祖考下無愧於斯民然後福祿愈逺而愈新也故末章終之以無不爾或承先生頷之董銖云蓼蕭詩云令德壽豈亦是此意蓋人君必有此德而可以稱是福也曰然潘時舉録何福不除義如除戎器之除吳必大録問如松柏之茂無不爾或承無不爾或承是繼承自相接續之謂如何曰松柏非是葉不凋但舊葉凋時新葉已生木犀亦然吕德昭録又說采薇詩云采薇首章略言征夫之出蓋以玁狁不可不征故舍其室家而不遑寧處至二章則既出而不能不念其家三章則竭力致死而無還心蓋不復念其家矣至四章五章則惟勉於王事而欲成其戰伐之功也卒章則其事成之後極陳其勞苦憂傷之情而念之也其序恐如此曰雅者正也乃王公大人所作之詩皆有次序而文意不茍極可玩味風則或出於婦人小子之口故但可觀其大略耳同上采薇采薇薇亦陽止薇亦剛止蓋薇之生也挺直周僴别録問采薇小人所腓傳曰腓猶庇也又引程子曰腓隨動也如足之腓足動則隨而動也必大案易咸傳曰腓足肚行則先動足乃舉之非如腓之自動也易本義亦曰欲行則先自動由程子前說觀之則腓為隨足以動之物由後二說觀之則腓為先足而動明矣不當引之以解此詩之義不若猶庇之云得之生民詩牛羊腓字之傳亦以腓為庇若施於此語與上文君子所依意義亦相類也答曰此非大義所繫今詳兩說誠不合當刪去然版本已定只於補脫中說破可也又百卉具腓又有他訓不知此字竟是何義也答吳必大潘時舉問畏此簡書簡書有二說一說簡書戒命也鄰國有急則以簡書相戒命一說策命臨遣之詞曰後說為長當以後說在前前說只據左氏簡書同惡相恤之謂然此是天子成命不得謂之鄰國也又問胡不斾斾東萊以為初出軍時旌旗未展惟卷而建之引左氏建故曰此旗何不斾斾而飛揚乎蓋以命下之初我方憂心悄悄而僕夫憔悴亦若人意之不舒也曰此說精巧然胡不斾斾一句語勢似不如此胡不猶言遐不作人言豈不斾斾乎但我自憂心悄悄而僕夫又況瘁耳如此却自平伯恭說詩太巧詩正怕如此看古人意思自寬平何嘗如此纎細拘迫銖曰先生詩傳舊取此詩與關雎論非天下之至靜不足以配天下之至健處今皆削之豈亦以其太精巧耶曰正為後來看得如此故削去銖曰關雎詩引康衡說甚好曰吕氏引但不如此詳便見古人看文字亦寬博如此董銖録文武以天保以上治內采薇以下治外始于憂勤終于逸樂這四句儘說得好楊道夫録或說魚麗詩云罶笱也者寡婦之器也寡婦得魚而不為富強所奪則是太平之象而可告功於神明也此因小序而失之固為無禮然専以笱為寡婦之器似亦未然蓋聚石為梁必有笱以承其闕空乃可得魚凡取魚者皆然非但寡婦也但笱易成而易用雖寡婦亦能置之故以為寡婦之笱他人則取魚之器尚多不専用笱耳非他人不得用笱而唯寡婦得用亦非謂寡婦只得用笱而不得更以他物取魚也谷風小辨之詩皆曰無逝我梁無發我笱豈寡婦之作也哉文集偶讀謾記潘時舉問南有嘉魚詩中汕汕字曰是以木葉捕魚今所謂魚花園是也南山有枸枸是檵枸子建陽謂之皆拱子味甘而解酒毒大學詩云樂只君子民之父母民之所好好之民之所惡惡之此之謂民之父母只語助辭言能潔矩而以民心為己心則是愛民如子而民愛之如父母矣章句所謂民之父母者何也君子有潔矩之道故能以己之好惡知民之好惡又能以民之好惡為己之好惡也夫好其所好而與之聚之惡其所惡而不以施焉則上之愛下猶父母之愛其子矣彼民之親其上豈不亦猶子之愛其父母哉或問潘時舉說蓼蕭湛露二詩先生曰文義也只如此却更須要諷詠實見他至誠和樂之意乃好潘時舉録克己如誓不與賊俱生克伐怨欲不行如薄伐玁狁至於太原但逐出境而已沈僴録潘時舉說采芑詩先生曰宣王南征蠻荆想不甚費力不曽大段戰鬬故只極稱其軍容之盛而已潘時舉録潘時舉說車攻吉日二詩先生曰好田獵之事古人亦多刺之然宣王之田乃是因此見得其車馬之盛紀律之嚴所以為中興之勢者在此其所謂田異乎尋常之田矣同上石鼓有說成王時又有說宣王時然其辭有似車攻甫田詩辭恐是宣王時未可知吕德明録孟子詩云不失其馳舍矢如破言御者不失其馳驅之法而射者發矢皆中而力集注潘時舉說庭燎詩至庭燎有輝先生曰輝火氣也天欲明而見其煙光相雜此是吳材老之說此一字極有功也潘時舉録問斯干言兄及弟矣式相好矣無相猶矣橫渠說兄弟冝相好不要相學指何而言曰不要相學不好處如兄能友其弟弟却不能恭其兄兄豈可學弟之不恭遂亦不友為兄者但當盡其友可也為弟能恭其兄兄乃不友其弟者為弟者豈可亦學兄之不友而遂忘其恭故為弟者但當知盡其恭而已又曰看詩夲意猶字當作相圗謀說徐㝢録豐其屋天際翔也似是說如翬斯飛樣言其屋之大蔽障闊㬊淵録潘時舉說斯干詩至載弄之瓦處先生曰瓦紡磚也瓦紡時所用之物舊見人畫列女傳漆室乃手執一物如今銀子樣者意其為紡磚也然未可必潘時舉録大學詩云節彼南山維石巖巖赫赫師尹民具爾瞻有國者不可以不慎辟則為天下僇矣節截然髙大貌師尹周大師尹氏也具俱也辟偏也言在上者人所瞻仰不可不謹若不能潔矩而好惡徇於一已之偏則身弒國亡為天下之大戮矣章句此所引節南山之詩何也曰言在尊位者人所觀仰不可不謹若人恣已徇私不與天下同其好惡則為天下僇如桀紂幽厲也或問潘時舉說節南山詩至秉國之均先生曰均本當從金所謂如泥之在鈞者不知鈞是何物時舉曰恐只是為瓦器者所謂車盤是也蓋運得愈急則其成器愈快恐此即是鈞也曰秉國之均只是此義今集傳訓平者此物亦惟平乃能運也潘時舉録林夔孫問節南山答曰自古小人其初只是他自竊國柄少間又有不奈何又引得别人來一齊不好了如尹氏大師却只是他一箇不好少間到那瑣瑣姻婭處是幾箇人不好了黃義剛録濳雖伏矣便覺有善有惡須用察相在爾室只教是存養工夫余大雅録古人說話皆有源流如小旻詩中云國雖靡止或聖或否民雖靡膴或哲或謀或肅或艾却合洪範五事此人往往曽𫝊箕子之學而曽讀洪範也精舍朋友雜記論語詩云戰戰兢兢如臨深淵如履薄氷戰戰恐懼兢兢戒謹臨淵恐墜履氷恐陷也集注潘時舉問小辨詩古今說者皆以為此詩之意與舜怨慕之意同竊以為只我罪伊何一句與舜於我何㦲之意同至後而君子秉心維其忍之與君子不惠不舒究之分明是怨其親却與舜怨慕之意似不同曰作小辨者自是未到得舜地位蓋亦常人之情耳只我罪伊何上面說何辜于天亦一似自以為無罪相似未可與舜同日而語也問小辨末章莫髙匪山莫浚匪泉君子無易由言耳屬于垣集傳作賦體疑莫是以上兩句興下兩句耶曰此只是賦蓋以為莫髙如山莫浚如泉而君子亦不可易其言亦恐有人聞之也又曰看小雅雖未畢且併看大雅小雅後數篇大槩相似只消兼看因言詩人所見極大如巧言詩奕奕寢廟君子作之秩秩大猷聖人莫之他人有心豫忖度之躍躍毚兔遇犬獲之此一章夲意只是惡巧言讒譛之人却以奕奕寢廟與秩秩大猷起興蓋以其大者興其小者便見其所見極大形於言者無非理義之極致也時舉云此亦是先王之澤未泯禮義根于其心故其形於言者自無非義理先生頷之潘時舉録東有啓明西有長庚庚續也啓明金星長庚水星金在日西故日將出則東見水在日東故日將沒則西見襲蓋卿録北斗七星在紫宫南其杓所建周於十二辰之舍以定十有二月斟酌元氣運平四時者也詩曰維北有斗不可以挹酒漿楚辭集注楚茨一詩精深宏博如何做得變雅李閎祖録問楚茨詩言先祖是皇神保是饗詩傳謂神保是鬼神之嘉號引楚辭語思靈保兮賢姱但詩中既說先祖是皇又說神保是饗似語意重復如何曰近見洪慶善說靈保是巫今詩中不說巫當便是尸却是向來解錯了此兩字陳文蔚録問楚茨以下四篇先生謂即豳雅反復讀之其辭氣與七月載芟良耜等篇大抵相類無可疑然又以為述公卿有田祿者力于農事以奉其宗廟之祭則恐未然蓋周自后稷以農事肇祀其祥未嘗不惓惓於此今以為豳風豳頌者皆是也而孟子亦曰禮曰諸侯耕助以供粢盛粢盛不潔不敢以祭古之人未有不先於民而後致力於神者恐不必専指公卿言之答曰此諸篇在小雅而非天子之詩故止得以公卿言之蓋皆畿內諸侯矣答吳必大又問瞻彼洛矣傳以為諸侯美天子之詩今考其間有以作六師之言則其為天子之事審矣然二章三章祈頌之語則不過保其家室家邦而已氣象頗狹反若天子所以告諸侯者何也答曰家室家邦亦趂韻耳天子以天下為家雖言家室何害又凡言萬年者多是臣祝君之辭同上葉賀孫問瞻彼洛矣洛水或云兩處曰只是這一洛有統言之有說小地名東西京千里東京六百里西京四百里此洛只就洛邑言之非指關洛葉賀孫録又問韎韐有奭韎韐毛鄭以為祭服王氏以為戎服曰只是戎服左傳云有韎韋之跗注是也又曰詩多有酬酢應答之篇瞻彼洛矣是臣歸美其君君子指君也當時朝㑹於洛水之上而臣祝其君如此裳裳者華又是君報其臣桑扈鴛鴦皆然同上李子方問列女傳引詩辰彼碩女作展彼碩女曰然且云向來煞尋得李閎祖録楊至問髙山仰止景行行止禮記引夫子之言曰詩之好仁如此鄉道而行云云其意安在曰古人止恁地學將去有時到了也不定今日便算時日討功效又問詩之正意髙山景行字當重看夫子之言則仰字行字當重看曰不是髙山景行又仰箇甚麼又行箇甚麼髙山景行便是那仁楊至録緡蠻黃鳥止於丘隅物亦各尋箇善處止可以人而不如鳥乎廖德明録大學詩云緡蠻黃鳥止于丘隅子曰於止知其所止可以人而不如鳥乎緡詩作綿緡蠻鳥聲丘隅岑蔚之處子曰以下孔子說詩之辭言人當知所當止之處也章句引綿蠻之詩而系以孔子之言孔子何以有是言也曰此夫子說詩之辭也蓋曰鳥於其所止之時猶知其當止之處豈可人為萬物之靈而反不如鳥之能知所止之乎其所以發明人當知止之義亦深切矣或問大學詩曰周雖舊邦其命維新言周國雖舊至於文王能新其德以及於民而始受天命也章句言周之有邦自后稷以來至于文王聖德日新而民亦丕變故天命之以有天下是其邦雖舊而命則新也蓋民之視效在君而天之視聽在民君德既新則民德必新民德既新則天命之新亦不旋日矣或問其命維新是新民之極和天命也新余大雅録孟子詩云周雖舊邦其命維新文王之謂也言周雖后稷以來舊為諸侯其受天命而有天下則自文王始也集注問橫渠言詩書言帝天之命主於民心曰皆此理也民心之所向即天心之所存也萬人傑録在帝左右察天理而左右也古注亦如此左氏傳天子所右寡人亦右之所左亦左之之意同上大學詩云穆穆文王於緝熙敬止為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信穆穆深逺之意於歎美辭緝繼續也熙光明也敬止言其無不敬而安所止也引此而言聖人之止無非至善五者乃其目之大者也學者於此究其精微之藴而又推類以盡其餘則于天下之事皆有以知其所止而無疑矣章句曰子之說詩既以敬止之止為語助之辭而於此書又以為所止之義何也曰古人引詩斷章或姑借其辭以明已意未必皆取本文之義也或問於緝熙敬止緝熙是工夫敬止是功效一殺處徐㝢録孟子詩云商之孫子其麗不億上帝既命侯于周服侯服于周天命靡常殷士膚敏祼將于京孟子引此詩及孔子之言以言文王之事麗數也十萬曰億侯維也商士商孫子之臣也膚大也敏逹也祼宗廟之祭以鬱鬯之酒灌地而降神也將助也言商之孫子衆多其數不但十萬而已上帝既命周以天下則凡此商之孫子皆臣服于周矣所以然者以天命不常歸於有德故也是以商士之膚大而敏達者皆執祼獻之禮助王祭事于周之京師也孔子因讀此詩而言有仁者則雖有十萬之衆不能當之集注大學詩云殷之未喪師克配上帝儀監于殷峻命不易道得衆則得國失衆則失國師衆也配對也配上帝言其為天下君而對乎上帝也監視也峻詩作駿大也不易言難保也章句曰得衆得國失衆失國何也曰言能潔矩則民父母之而得衆得國矣不能潔矩則為天下僇而失衆失國矣或問殷之未喪師克配上帝紂未作不好時便與天相配是甚細事葉賀孫録馬節之問無遏爾躬一章答曰無自遏絶於爾躬如家自毁國自伐襲蓋卿録中庸無聲無臭夲是說天道彼其所引詩詩中自說須是儀刑文王然後萬邦作孚詩人初不在無聲無臭上也中庸引之以結中庸之義余大雅録舊嘗見橫渠詩傳中說周至太王辟國已甚大其所有地皆是中國與夷狄夾界所空不耕之地今亦不復見此書矣意者周之興與元魏相似初自極北起來漸漸強大到得後來中原無主故遂被他取了輔廣録孟子詩云古公亶父來朝走馬率西水滸至於岐下爰及姜女聿來胥宇當是時也內無怨女外無曠夫大王公劉九世孫古公大王之本號後乃追尊為大王也亶父大王名也來朝走馬避狄人之難也率循也滸水崖也岐下岐山之下也姜女大王之妃也胥相也宇居也曠空也無怨曠者是大王好色而能推已之心以及民也集注荼恐是蓼屬故詩人與堇並稱堇乃烏頭非先苦而後甘也又云荼毒蓋荼有毒今人用以藥溪魚荼是其類則宜亦有毒而不得為苦苣矣如薺如飴乃詩人甚言周原之美舊室之悲如易之載鬼詩之童羖非荼實能甘也答吳斗南爰契我龜乃刀刻龜也古人符契亦是以刀刻木而合之今之蠻洞猶有此俗有警急調發便知日期去處逺近亦契之意也蔡念成述季燔所聞虞芮質厥成文王蹶厥生蹶動也生是興起之意當一日之間虞芮質成而來歸者四十餘國其勢張盛一時見之如忽然跳起也又曰分鹿說如今人言軍勢益張黃義剛録問蹶厥生是如何曰是作地跳起來當時虞芮質成時一日之間來歸者四十餘國其忽然湧盛如此故文王作地跳起此亦是詩人說他又問東萊說是文王自動其中意其何以生得虞芮之感如此遂歸功於四臣先生曰雖說得巧只是經意不如此熹不曽如此巧說若要把做文王自說須說曰豫有疏附先後之臣方得跳起之說雖小著文王亦不奈何是詩人恁地說著了吕德明録文王蹶厥生一節看那綿一詩自古公亶父積纍至文王肆不殄厥愠亦不殞厥問時其勢已盛至虞芮質成來歸者四十餘國其勢又盛故詩人言文王興起之勢如此所以興起者豫曰文王有此四臣以輔助但止平說看來無甚滋味却不是穿鑿同上詩人只見他恁地重三疊兩說將謂是無倫理次序不知他一闕不闕亂下文蔚曰今日偶看棫朴一篇凡有五章前三章是說人歸附文王之德後二章乃言文王有作人之功及綱紀四方之德致得人歸附者在此一篇之意次第甚明白然遐不作人却是說他鼓舞作興底事功夫細密處又在後一章如曰勉勉我王綱紀四方四方便都在他線索內牽著都動文蔚曰勉勉即是純亦不已否曰然如追琢其章金玉其相是那工夫到後文章真箇是盛美資質真箇是堅實陳文蔚録倬彼雲漢則為章于天矣周王夀考則何不作人乎遐之為言何也此等語言自有箇血脉流通處但涵泳久之自然見得條暢浹洽不必多引外來道理言語却壅滯却詩人活底意思也周王既是壽考豈不作成人材此事已自分明更著箇倬彼雲漢為章于天喚起來便愈見活潑潑地此六義所謂興也興乃興起之義凡言興者皆當以此例觀之易以言下盡意而立象以盡意蓋亦如此答何鎬書遐不作人古注并諸家皆作逺字甚無道理禮記注訓胡字最好周謨録問棫朴追琢其章金玉其相傳曰追琢其章所以美其文金玉其相所以美其質然不知所美之人為誰答曰追琢金玉以興我王之勉勉爾答吳必大追琢其章金玉其相須是有金玉之質方始琢磨得出若是泥土之質假饒你如何去裝飾只是箇不好物事葉賀孫録中庸詩云鳶飛戾天魚躍于淵言其上下察也鳶鴟類戾止也察著也子思引此詩以明化育流行上下昭著莫非此理之用章句道之流行發見於天地之間無所不在在上則鳶之飛而戾于天者此也在下則魚之躍而出於淵者此也其在人則日用之間人倫之際夫婦之所知所䏻而聖人之所不知不能者亦此也此其流行發見於上下之間可謂著矣或問問鳶飛戾天上面更有天在魚躍于淵下面更有地在如何曰此是謝顯道語熹亦自理㑹不得看他意思只是道不可執著說道上面更有天在下面更有地在不止於此也邵浩别録或問鳶飛魚躍之說曰此蓋是分明見得道體發見處察者著也非察察之察也詩中之意夲不為此中庸只是借此兩句形容道體周謨録觀文王雍雍在宫肅肅在廟不顯亦臨無斁亦保便可見敬只是如此余大雅録潘時舉說皇矣詩先生謂此詩稱文王德處是從無然畔援無然歆羡上說起後面却又說不識不知順帝之則見得文王先有這箇工夫此心無一毫之私故見於伐崇伐密皆是道理合著恁地初非聖人之私怒也對曰無然畔援無然歆羡乃是說文王生知之資得於天之所命自然無畔援歆羡之意後面不識不知順帝之則乃是文王做工夫處曰然潘時舉録孟子詩云王赫斯怒爰整其旅以遏徂莒以篤周祜以對于天下此文王之勇也赫赫然怒貌爰於也旅衆也遏詩作按止也徂往也莒詩作旅徂旅謂密人侵阮徂共之衆也篤厚也祜福也對答也以答天下仰望之心也此文王之大勇也集注周人詠文王伐崇伐密事皆以帝謂文王言之若曰此蓋天意云耳文王既戡黎又伐崇伐密已做得事勢如此只是尚不肯伐紂故曰至德吳必大録問取之而燕民恱則取之古之人有行之者武王是也取之而燕民不恱則勿取古之人有行之者文王是也竊疑文王大聖人於君臣之義尊卑之等豈不洞見而容有革商之念㦲曰此等處難說孔子謂可與立未可與權到那時事勢自是要住不得後來人把文王說得忒恁地却做一箇道行看著不做聲不做氣如此形容文王都沒情理以詩書考之全不是如此如詩自從大王王季說來如云至于大王實始翦商如下武之詩文王有聲之詩都說文王出做事且如伐崇一節是做甚麼這又不是一項小小侵掠乃是大征伐詢爾仇方同爾兄弟以爾鉤援與爾臨衝以伐崇墉此見大段動衆岐山之下與崇相去自是多少里因甚如此這般處要做文王無意出做事都不得又如說侵自阮疆陟我髙岡無矢我陵我陵我阿無飲我泉我泉我池這看見都自據有其土地這自是大段施張了或云紂命文王得専征伐紂不得已命之文王不得已受之橫渠云不以聲色為政不以革命有中國默順帝則而天下歸焉其為文王乎若如此說恰似內無絶臣之義外亦不屬于商這也未必如此只是事勢自是不可已只當商之季七顛八倒上下崩頽忽於岐山下突出許多人也是誰當得文王之事惟孟子識之故七篇之中所以告列國之君莫非勉之以王道葉賀孫録孟子詩云經始靈臺經之營之庶民攻之不日成之經始勿亟庶民子來王在靈囿麀鹿攸伏麀鹿濯濯白鳥鶴鶴王在靈沼於牣魚躍文王以民力為臺為沼而民歡樂之謂其臺曰靈臺謂其沼曰靈沼樂其有麋鹿魚鱉古之人與民偕樂故能樂也此引詩而釋之以明賢者而後樂此之意經量度也靈臺文王臺名也營謀為也攻治也不日不終日也亟速也言文王戒以勿亟也子來如子來趨父事也靈囿靈沼臺下有囿囿中有沼也麀牝鹿也伏安其所不驚動也濯濯肥澤貌鶴鶴潔白貌於歎美辭牣滿也孟子言文王雖用民力而民反歡樂之既加以美名而又樂其所有蓋由文王䏻愛其民故民樂其樂而文王亦得以享其樂也集注問於論鼓鐘於樂辟雍注云辟雍天子之學也不知辟雍從來是天子之學還是文王始為之及周有天下遂以為天子之學亦如臯門應門始立於大王而後遂以為天子之門邪答曰見不得答潘時舉問下武三后在天解云在天言其既沒而其精神上合于天此是如何曰便是又有此理劉礪云恐只是此理上合於天耳曰既有此理便有此氣或曰想是聖人禀德清明純粹之氣故其死也其氣上合於天曰也是如此這事又微妙難說要人自看得世間道理有正當易見者又有變化無常不可窺測者如此方看得這箇道理活如云文王陟降在帝左右如此若說文王真箇在上帝之左右真箇有箇上帝如世間所塑之像者固不可然聖人如此說便是有此理沈僴録徐㝢問三分天下有其二以服事殷使文王更在十三四年將終事紂乎抑為武王牧野之舉乎曰看文王亦不是安坐不做事底人如詩中言文王受命有此武功既伐於崇作邑于豐文王蒸哉云云武功皆是文王做來詩載武王武功却少但卒其伐功耳觀文王一時氣勢如此度必不終竟休了一似果實文王待他十分黃熟自落下來武王却似生擘破一般徐㝢録帝王之興受命之祥如河圗洛書元鳥生民之詩固有是理非以為先恨學者推之過詳流入䜟緯而後人舉從而廢之亦過矣葉賀孫録生民詩是敘事詩只得恁地蓋是敘那事要盡下武文王有聲等詩却有反復歌詠底意思黃義剛録生民等詩也可見祭祀次第此與儀禮正相合同上潘時舉說生民詩至履帝武敏歆攸介攸止先生曰敏字當為絶句蓋作母鄙反叶上韻耳履巨迹之事有此理且如契之生詩中亦云天命𤣥鳥降而生商蓋以為稷契皆天生之爾非有人道之感不可以常理論也漢髙祖之生亦類此此等不可以言盡當意㑹之可也潘時舉録問履帝武敏曰此亦不知其如何但詩中有此語自歐公不信祥瑞故後人才見說詩瑞者皆闢之若如後世所謂祥瑞固多是僞妄然豈可因後世之僞妄而併真實者皆以為無乎鳯鳥不至河不出圗孔子之言不成亦以為非輔廣録先生如達是首生之子也故曰元子楚辭集注潘時舉說既醉詩以為古人祝頌多以壽考及子孫衆多為言如華封祝堯以為願聖人壽願聖人多男子亦是此意曰此兩事孰有大於此者乎對曰觀行葦及既醉二詩見古之人君盡其誠敬於祭祀之時極其恩義於燕飲之際凡父兄耆老所以祝望之者如此則其獲福也宜矣此所謂禍福無不自已求之者也先生頷之潘時舉録潘時舉問釐爾女士曰女之有士行者銖曰荆公作向后冊云唯昔先王釐厥士女士女與女士義自不同蘇子由曽論及曰恐他只是倒用了一字耳董銖録潘時舉說假樂詩先生曰此詩末章即承上章之意故上章云四方之綱而下章即繼之曰之綱之紀蓋張之為綱理之為紀下面百辟卿士至於庶民皆是賴君以為綱所謂不解於位者蓋欲綱常張而不弛也同上問大德者必受命答曰董仲舒䇿引宜民宜人受祿于天之詩云為政而宜于民者固當受祿於天其說甚好假樂詩干祿百福處止云子孫千億穆穆皇皇宜君宜王不愆不忘率由舊章但願其子孫之多與子孫之賢而已又云孔子不受命堯舜不能及其子孫皆非常理也萬人傑别録嘉樂詩下章不說其他但願其子孫之多且賢耳此意甚好然此亦其理之常若堯舜之子不肖則又非常理也輔廣録中庸詩曰嘉樂君子憲憲令德宜民宜人受祿于天保祐命之自天申之嘉詩作假當依此作嘉憲當依詩作顯申重也章句干祿百福子孫千億是願其子孫之衆多穆穆皇皇宜君宜王不愆不忘率由舊章是願其子孫之賢楊道夫録孟子昔者公劉好貨詩云乃積乃倉乃裹餱糧于橐于囊思戢用光弓矢斯張干戈戚揚爰方啓行故居者有積倉行者有裹糧也然後可以爰方啓行公劉后稷之曽孫也積露積也餱乾糧也無底曰橐有底曰囊皆所以盛餱糧也戢安集也言思安集其民人以光大其國家也戚斧也揚鉞也爰於也啓行言往遷於豳也言公劉之民富足如此是公劉好貨而能推己之心以及民也集注公劉詩鞞琫容刀注云容刀如言容臭言鞞琫之中容此刀也容臭如今香囊也既富既繁既順乃宣者公劉始初草創而人之從之己如此其盛是以居邑由是而成也君之宗之者只是公劉自為羣臣之宗主耳吕氏以為立君立宗董銖録潘時舉問第二章說既庶既繁既順乃宣而第四章方言居邑之成不知未成邑之時何以得民居之繁庶也曰公劉始於草創而人之從之者也若是其盛是以居邑由是而成也又問第四章君之宗之處曰東萊以為為之立君立宗恐未必是如此只是公劉自為羣臣之君宗耳蓋此章言其一時燕饗未說及立宗事也又問徹田為糧處曰徹通也乃是橫渠說然以孟子考之只曰八家皆私百畝同養公田又春秋傳云公田不治則非民私田不治則非吏似又與橫渠之說不同蓋未必是計畝而分也又問此詩與豳七月詩皆言公劉得民之盛想周家自后稷以來至公劉始稍盛耳曰自后稷之後至於不窋蓋已失其官守故云文武之先不窋至於公劉乃始復修其業故周室由是而興也潘時舉録下同又說民勞詩竊謂每章上四句是刺厲王下六句是戒其同列如此是否曰皆只是戒其同列然鋪敘如此便自可見故熹以為古人非是直作一詩以刺其王只陳其政事之失自可以為戒矣時舉因謂第二章末謂無棄爾勞以為王休蓋以為王者之休莫大於得人惟羣臣無棄其功然後可以為王之休美至第三章後二句謂敬慎威儀以近有德蓋為既䏻拒絶小人必須自反於己能自反於己又不可以不親有德之人不然則雖欲絶去小人未必有以服其心也後二章無俾正敗無俾正反尤見詩人憂慮之深蓋正敗則惟敗壞吾之正道而正反則全然反乎正矣其憂慮之意蓋一章切於一章也先生頷之又說板詩張子謂天體物而不遺猶仁體事而無不在也天體物而不遺是指理而言仁體事而無不在是指人而言否曰體事而無不在是指心而言也天下一切事皆此心發見爾先生因言讀書窮理當體之於身凡平日所講貫窮究者不知逐日常見得在吾心目間否不然則隨文逐義趕趂期限不見恱處恐終無益並同上孟子詩云天之方蹶無然泄泄泄泄猶沓沓也事君無義進退無禮言則非先王之道者猶沓沓也蹶顛覆之意泄泄怠緩恱從之貌言天欲顛覆周室羣臣無得泄泄然不急救正之沓沓即泄泄之意蓋孟子時人語如此集注昊天曰明及爾出王昊天曰旦及爾游衍旦明祇一意這箇豈是人自如此皆有來此則才有少肆意他便見又曰這裏若有此此違他理便恰似天知得一般所以說日監在兹又說敬天之怒無敢戲豫敬天之渝無敢馳驅楊道夫問渝是如何曰渝變也如迅雷風烈必變之變渝未至於怒亦大槩相似楊道夫録又言昨來所論昊天曰明及爾出王昊天曰旦及爾游衍此意莫祇是言人之所以為人者皆天之所為故雖起居動作之頃而所謂天者未嘗不在也曰公說天體物不遺既說得是則所謂仁體事而無不在者亦不過如此今所以理㑹不透祇是以天與仁為有二也今須將聖賢言仁處就自家身上思量久之自見同上潘時舉說蕩詩云首章前四句有怨天之辭後四句乃解前四句謂天之降命夲無不善惟人不以善道自終故天命亦不克終如疾威而多邪僻也此章之意既如此故自次章以下託文王言紂之辭而皆就人君身上說使知其非天之過如女興是力爾德不明與天不湎爾以酒匪上帝不時之類皆自發明首章之意大略如此未知是否先生頷之潘時舉録中庸詩曰神之格思不可度思矧可射思夫微之顯誠之不可掩如此夫格來也矧况也射厭也言厭怠而不敬也思語辭誠者真實無妄之謂隂陽合散無非實者故其發見之不可掩如此章句詩云相在爾室尚不愧于屋漏相視也屋漏室西北隅也同上孟子詩云誰能執熱逝不以濯逝語辭也言誰能執持熱物而不以水自濯其手乎集注下同詩云其何能淑載胥及溺淑善也載則也胥相也言今之所為其何能善則相引以陷於亂亡而已詩曰天生蒸民有物有則民之秉夷好是懿德孔子曰為此詩者其知道乎故有物必有則民之秉夷也故好是懿德蒸詩作蒸衆也物事也則法也夷詩作彞常也懿美也有物必有法如有耳目則有聰明之德有父子則有慈孝之心是民所秉執之常性也故人之情無不好此懿德者以此觀之則人性之善可見並同上天生蒸民有物有則蓋視有當視之則聽有當聽之則如是而視如是而聽便是不如是而視不如是而聽便不是謂如視逺惟明聽德惟聰能視逺謂之明不能視逺不謂之明能聽德謂之聰不能聽德不謂之聰視聽是物聰明是則推至於口之於味鼻之於臭莫不各有當然之則所謂窮理窮此而已精舍朋友雜記郭友仁問聖門說知性佛氏亦言知性曰天生蒸民有物有則若如公所見及佛氏之說只有物無則了所以與聖門有差郭友仁録問蒸民詩解云仲山甫蓋以冢宰兼太保何以知之曰其言式是百辟則是為宰相可知其曰保兹天子王躬是保則是為太保可知此正召康公之舊職輔廣録問巧言令色鮮矣仁記言辭欲巧詩言令儀令色者何也曰看文字不當如此記言辭欲巧是非要人機巧蓋欲其辭之委曲耳如語言夫子為衛君乎答曰吾將問之入曰伯夷叔齊何人也之類是也詩言令色與此不同詩人所謂令色者仲山甫之正道自然如此非是做作恁地何不看取上文上文云仲山甫之德令儀令色此德之形於外者如此與鮮矣仁者不干事竇從周録問子曰巧言令色詩取令儀令色何也答曰論語與詩人之義各異當玩繹其上下文意以求之不可只如此摘出一兩字看也答吳必大夫子所謂遜以出之辭欲巧者亦其一事也仲山甫之德柔嘉維則令儀令色則大賢成德之行而進乎此者夫子之逞顔色怡怡如也乃聖人動容周旋中禮之事又非仲山甫之所及矣至於小人訐以為直色厲內荏則雖與巧言令色者不同然考其矯情飾僞之心實巧言令色之尤者故聖人惡之上蔡引此數條而不肯明言其所以然者將使學者深求而自得之也然令學者反求之於冥漠不可知之中失之愈逺言仁録中所解亦少文集偶讀謾記蒸民詩仲山甫之德柔嘉維則詩傳中用東萊吕氏說文蔚舉似及此先生曰記得他甚主張那柔字文蔚曰他後面一章云柔亦不茹剛亦不吐此言仲山甫之德剛柔不偏也而二章首舉仲山甫之德獨以柔嘉維則蔽之嵩髙稱申伯番番終論其德亦曰柔惠且直然則入德之方其可知矣曰如此則乾卦用不得了人之資禀自有柔德勝者自有剛德勝者如本朝范文正公富鄭公輩是以剛德勝范忠宣范淳夫趙清獻蘇子容輩是以柔德勝只是他柔却是柔但其中自有骨子不是一向如此柔去便是人看文字要得言外之意若以仲山甫柔嘉維則必要以此為入德之方則不可人之進德須用剛健不闕陳文蔚録又論既明且哲以保其身曰只是上文肅肅王命仲山甫將之邦國若否仲山甫明之便是明哲所謂明哲者只是曉天下事理順理而行自然災害不及其身可以保其祿位今人以邪心讀詩謂明哲是見幾知微先去占取便宜如楊子雲說明哲煌煌旁燭無疆遜于不虞以保天命便是占便宜底說話所以他一生被這幾句誤然明哲保身亦只是常法若到那舍生取義處又不如此論同上召旻第六章集傳作賦體竊疑是比體未知如何答曰作比為是答潘時舉書古之聖賢遇災而懼嚴恭祇畏以正厥事猶不敢庶幾其萬一故曰瞻卬昊天曷惠其寧張氏中庸辨詩傳遺說卷五
