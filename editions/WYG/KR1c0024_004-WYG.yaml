body:
  text: 詩傳遺説卷四宋朱鑑編國風論語子謂伯魚曰女為周南召南矣乎人而不為周南召南其猶正牆面而立也與為猶學也周南召南詩首篇名所言皆修身齊家之事正牆面而立言即其至近之地而一物無所見一歩不可行集注問程氏云詩有二南猶易有乾坤莫只是以功化淺深言之曰不然又問莫是王者諸侯之分不同曰今只看大序中説便可見大序云闗雎麟趾之化王者之風故係之周公鵲巢騶虞之徳諸侯之風先王之所以教故係之召公只看那化字與徳字及所以教字便見二南猶乾坤也陳文蔚錄問二南之詩真是以此風化天下不曰亦不須問是要風化天下與不風化天下闗闗雎鳩在河之洲云云裏面㸔義今人讀書只是説向外面去却於本文全不識錢木之録問召南之有鵲巢猶周南之有闗雎言窈窕淑女則是眀言后妃之徳也惟鵲巢三章皆不言夫人之徳如何曰鳩之為物其性専静無比可借以見夫人之徳也潘時舉錄問周南召南程子曰周南召南如乾坤詩傳注云乾統坤坤承乾徳眀之意恐是必先有周南之化然後有召南之徳曰然但程子只説如乾坤未知其意是與不是如此乃熹之意如此説盖化是自上而化下徳是自下而承上吕徳眀錄先生嘗抄二南寄劉玶因題詩云闕里言詩但賜商子貢子夏千秋誰復與相望鄒汾孟子文中子斷簡光前載闗洛張子程子新書襲舊芳析句分章功自小吟風弄月興何長從容咏歎無今古此樂從兹樂未央文集李燔説周南先生曰他大綱領處只是戒謹恐懼上只是闗闗雎鳩便從這裏做起後面只是漸漸推得闊沈僴錄讀闗雎詩使人有齊荘中正意思所以冠於三百篇與禮首言毋不敬書首言欽明文思皆同吴必大錄論語子曰師摰之始闗雎之亂洋洋乎盈耳哉師摰魯樂師名摰也亂樂之卒章也史記曰闗雎之亂以為風始洋洋美盛意孔子自衛反魯而正樂適師摰在官之初故樂之美盛如此集注子曰闗雎樂而不淫哀而不傷淫者樂之過而失其正者也傷者哀之過而害於和者也闗雎之詩言后妃之徳宜配君子求之未得則不能無寤寐反側之憂求而得之則宜其有琴瑟鐘鼓之樂盖其憂雖深而不害於和其樂雖盛而不失其正故夫子稱之如此欲學者玩其辭審其音而有以識其性情之正也同上闗雎樂而不淫哀而不傷琴瑟鐘鼓樂也寤寐輾轉哀也烏有所謂淫與傷哉只是説情性之正子引詩大序不是止可就詩中看從范氏説周謨錄諸生講闗雎樂而不淫哀而不傷有引明道之説為證者先生曰明道言哀窈窕思賢才而無傷善之心焉此言無傷善與所謂哀而不傷者如何對曰為其相似故明道舉以為證曰不然無傷善與哀而不傷兩般樂而不淫哀而不傷只是言哀樂中事謂不傷為無傷善之心則非矣同上問闗雎樂而不淫哀而不傷是詩人之性情如此抑詩之詞意如此曰也是有那情性方有那詞氣陳淳錄問孔子言闗雎樂而不淫哀而不傷是言樂不至於淫哀不至於傷今詩序将哀樂淫傷判作四事似錯㑹論語意以此疑大序非孔子作答曰此説得之大序未知果誰作也答熊夢兆闗雎樂而不淫哀而不傷其憂也至於展轉反側而已是不傷也其樂也至於琴瑟鐘鼓而止是不淫也是詩人得性情之正也沈僴錄又問闗雎樂而不淫哀而不傷於詩何以見之曰憂止於展轉反側若憂愁哭泣則傷矣樂止於鐘鼓琴瑟若沉湎淫泆則淫矣同上又問闗雎樂而不淫哀而不傷曰此言作詩之人樂不淫哀不傷也因問此詩是何人作曰㸔来恐是宫中人作盖宫中人思得淑女以配君子故未得則哀既得則樂然當哀而哀而亦止於展轉反側則哀不過其則當樂而樂而亦止於鐘鼓琴瑟則樂不過其則此其性情之正也董銖錄闗雎一詩義理深奥如乾坤二卦一般只可熟讀詳味不可説至於葛覃卷耳其言迫切主於一事便不可如此了黄有開記闗雎之詩非民俗所可言度是宫闈中所作木之問程子云是周公作是否曰也未見得是錢木之錄闗雎之詩看得来是妾媵做所以形容得寤寐反側之事外人做不到此周眀作録問闗雎言后妃之徳宜配君子故託辭以見意謂求之未得則不能無寤寐反側之憂求之而得則宜有琴瑟鐘鼓之樂是哀樂之𤼵而見於辭者然常人之樂易至於淫淫者樂之過而失其正也常人之哀易至於傷傷者哀之過而害於和也惟闗雎之詩樂雖至而不失其正憂雖深而不害於和其得情性之正如此學者須是玩其辭審其音而後知之先生曰只玩其辭便見得若審其音也難闗雎是樂之卒章故曰闗雎之亂亂者樂之卒章也如楚辭有亂曰是也前面須更有但今不可攷耳鄭南升録徐㝢問闗雎之亂何謂樂之卒章曰自闗闗雎鳩至鐘鼓樂之皆是亂想其初必是已作樂只無此詞到此處便是亂陳淳錄問闗雎之亂亂何以訓終曰既奏以文又亂以武甘節錄闗雎之淑女似指嬪御恐非詩意荅徐彦章雎鳩毛氏以為摰而有别一家作猛摰説謂雎鳩是鶚之属鶚自是沉摰之物恐無和樂之意盖摰與至同言其情意相與深至而未嘗狎便見其樂而不淫之意此是興詩興起也引物以起吾意如雎鳩之摰而有别之物荇菜是潔静和柔之物引此起興猶不甚逺其他亦有全不相類只借他物而起吾意者雖皆是興與闗雎又略不同也潘時舉錄古説闗雎為王雎摰而有别居水中善捕魚説得来可畏當是鷹鶻之類做得吕武氣象恐后妃不然熹見得人説淮上一般水禽名王雎雖有兩箇相随然相離每逺此説却與列女𫝊所引義合邵浩别録王鳩嘗見淮上人説淮上有之状如此間之鳩差小而長常是雌雄二箇不相失雖然二箇不相失亦不曽相近而立處須是隔丈来地所謂摰而有别是也人未嘗見其匹居而乗處乗處謂四箇同處也只是二箇相随既不失其偶又未嘗近而相狎所以為貴也葉賀孫錄或讀闗雎問其訓詁名物皆不能言便説樂而不淫哀而不傷云云者余告之曰若如此讀詩則只消此八字更添思無邪三字成十一字後便無話可説三百五篇皆成查滓矣文集偶讀謾記不妬忌是后妃之一節闗雎是論其全體李閎祖錄魏丙問闗雎注摰至也至先生作切至説似形容其美何如曰也只是恁地問芼字曰擇也讀詩只是将意思想象去看不如他書字字要捉縳教定詩意只是疊疊推上去因一事上有一事一事上又有一事如闗雎形容后妃之徳如此又當知得君子之徳如此又當知得意人形容得意味深長如此必不是以下㡳人又當知所以齊家所以治國所以平天下人君則必當如文王后妃則必當如太姒其大原如此先生問曹叔遐曰君舉所説詩謂闗雎如何對曰謂后妃自謙不敢當君子謂如此之淑女方可為君子之仇匹這便是后妃之徳曰鄭氏自如此説了熹看来恁地説也得只是覺得偏主一事無正大之意闗雎如易之乾坤意思如何得恁地無方際如下面諸篇却多就一事説這只反覆形容后妃之徳而不可指説道甚麽是徳只恁地渾淪説這便見后妃徳盛難言處同上曹叔遐又言陳氏説闗雎以美夫有謙退不敢自當君子之徳先生曰如此則淑女又别是一箇人也曰是如此先生笑曰今人説經多是恁地囘䕶説去如史丞相説書多是如此説祖伊恐奔告于受處亦以紂為好人而不殺祖伊若他人則殺之矣黄有開記或問左右芼之先生曰芼是擇也左右擇而取之也同上闗雎章句亦方疑之當作四章三章章四句一章章八句乃安但於舊説俱不合莫可兼存之否好逑如字乃安毛公自不作好字説更檢兔罝好仇處㸔音如何恐不須點破也蘓黄門併載馳詩中兩章四句作一章八句文意亦似闗雎末後兩章琴瑟友之鐘鼓樂之作一章八句依故説亦得劄劉玶書問卷耳與前篇葛覃同是賦體又似畧不同盖葛覃直叙其所嘗經歴之事卷耳則是託言也曰亦安知后妃之不自采卷耳設便不曽經歴而自言我之所懐者如此則亦是賦體也若螽斯則只是比盖借螽斯以比后妃之子孫衆多然宜爾子孫振振兮却是説螽斯之子孫不是后妃之子孫也盖比詩多不説破這意然亦有説破者此前數篇賦比興皆已備矣自此推之令篇篇各有著落乃好時舉因云螽斯是春秋所書之螽竊疑斯字只是語辭恐不可便把螽斯為名曰詩中固有以斯為語者如鹿斯之奔湛湛露斯之類是也然七月詩乃云斯螽動股則恐螽斯即便是名也潘時舉録昨因聽兒輩誦詩偶得此義可以補横渠説之遺謾錄去可於疑義簿上錄之一章言后妃志於求賢審官又知臣下之勤勞故采卷耳備酒漿雖后妃之識然及其有懐也則不盈頃筐而棄置之於周行之道矣言其憂之切也二章三章皆臣下勤勞之甚思欲酌酒以自解之辭凡言我者皆臣下自我也此則述其所憂又見不得不汲汲於采卷耳也四章甚言臣下之勤勞也答劉玶書南有樛木便有葛藟纍之樂只君子便有那福履綏之吕徳眀録大學詩云桃之夭夭其葉蓁蓁之子于歸宜其家人宜其家人而后可以教國人詩云宜兄宜弟宜兄宜弟而后可以教國人詩云其儀不忒正是四國其為父子兄弟足法而后民法之也此謂治國在齊其家章句曰既結上文而復引詩者三何也曰古人言必引詩盖取其嗟歎詠歌優游厭飫有以感𤼵人之善心非徒取彼之文證此之義而已也夫以此章所論齊家治國之事文具而意足矣復引詩非能於其所論之外别有所𤼵眀也然嘗試讀之則反復吟詠之間意味深長義理通暢使人心融神㑹有不知手舞而足蹈者是則引詩之助與為多焉盖不獨此他凡引詩云者皆以是而求之則引之意可見而詩之為用亦得矣曰三詩亦有序乎曰首言家人次言兄弟終言四國亦刑于寡妻至于兄弟以御于家邦之意也或問公侯好仇注云好仇是善匹是言其才徳相合處公侯腹心注云同心同徳是言其才徳與已無異了吕徳眀録膽欲大而心欲小戰戰兢兢如臨深淵方能為赳赳武夫公侯干城之事廖徳眀錄問芣苢薄言有之𫝊曰有藏也然其下章曰掇曰捋曰袺曰襭而首章乃先言藏恐非其序必大恐有是得之之義答曰首章兼舉始終而言後章乃細述其次第詩中亦有此例或於補脱中附入亦可也答吴必大問漢之廣矣不可泳思江之永矣不可方思此是興何如曰主意只説漢有游女不可求思兩句六句是反覆説如奕奕寢廟君子作之秩秩大猷聖人莫之他人有心予忖度之躍躍毚兔遇犬獲之上下六句亦只興出他人有心兩句葉賀孫錄漢廣游女求而不可得行露之男不能侵陵正女豈當時婦人蒙化而男子則非亦是偶有此様詩説得一邊陳淳録陳君舉詩言汝墳是已被文王之化者江漢是聞文王之化而未被其澤者却有意思余大雅録錢木之問麟趾騶虞之詩莫是當時有此二物出来否曰不是只是取以為比云即此便是麟便是騶虞又問詩序説麟趾之時無義禮曰此語有病錢木之錄問麟之趾傳以麟興文王后妃以趾興其子故曰麟性仁厚故其趾亦仁厚文王后妃仁厚故其子亦仁厚然則下文吁嗟麟兮為指誰耶答曰正指公子而言也答吴必大陳埴問采蘩詩何故存兩説曰如今不見得果是如何且與兩存從来説蘩所以生蠶可以供蠶事何必抵死説道只為奉祭祀不為蠶事錢木之錄問采蘋蘩以供祭祀采枲耳以備闕人恐未必親爲之曰詩人且是如此説廖德明録問采蘩詩若只作祭事説自是曉然若作蠶事説雖與葛覃同類而恐實非也葛覃是女功采蘩是婦職以為同類亦無不可何必以蠶事而後同耶曰此説亦姑存之而已潘時舉錄問摽有梅詩固是出於正只是如此急迫何耶曰此亦是人之情嘗見晉宋間有怨父母之詩讀詩者於此亦是逹男女之情陳文蔚錄如摽有梅詩女子自言婚姻之意如此㸔来自非正理但人情亦自有如此者不可不言向見伯恭麗澤詩有唐人女言兄嫂不以嫁之詩亦自鄙俚可惡後来思之亦自是見得人之情處為父母者能於是而察之則必使之及時矣此所謂詩可以觀錢木之録古人作詩其言語多有用意不相連續如嘒彼小星三五在東釋者皆云小星者是在天至小之星也三五在東者是五緯之星應在於東也其言全不相貫又指前面一燈子與背後一竹格子云似説這燈却又説在那格子上面去不知古人作詩何故與今人語言大不相同黄有開記江大江也夏水名或以為自江而别以通於漢還復入江冬竭夏流故謂之夏而其入江處今名夏口即詩所謂江有汜也楚辭集注問何彼穠矣詩何以錄於召南曰有是有些不稳當但先儒相𫝊如此説也只得恁地就他説如定要分箇正經及變詩也自難攷據如頌中盡多周公説話而風雅又未知何如葉賀孫錄今人言五男二女亦有所本詩疏所謂武王有五男二女盖出於此五男者如左傳邗晉應韓為武之穆與成王則五矣二女者太姬下嫁陳胡公其一也詩何彼穠矣王姬下嫁齊侯之子則二也騶虞詩人在壹𤼵之前使庶類蕃殖者仁也壹𤼵五豝者義也萬人傑録騶虞之詩盖於田獵之際見動植之繁庶因以賛詠文王平昔仁澤之所及而非指田獵之事為仁也禮曰無事而不田曰不敬故此詩彼茁者葭仁也壹𤼵五豝義也吴必大錄吁嗟乎騶虞㸔来只可觧做獸名以吁嗟麟兮類之可見若解做騶虞之官終無甚意思沈僴錄邶鄘衛之詩未詳其説然非詩之本意不足深究歐公此論得之答何鎬書問柏舟詩汎彼柏舟亦汎其流注作比義看来與闗闗雎鳩在河之洲亦無異彼何以為興曰他下面便説淑女見得是因彼興此此詩才説柏舟下面便無貼意見得其意如此潘時舉録陳埴疑柏舟詩觧日居月諸胡迭而微太深又屢辨賦比興之體先生曰賦比興固不可以不辨然讀詩者須當諷詠看他詩人之意是在甚處如柏舟綠衣不得於其夫宜其怨之深矣而其言曰我思古人實獲我心又曰静言思之不能奮飛其詞氣忠厚惻怛怨而不過如此所謂止乎禮義而中喜怒哀樂之節者所以雖為變風而雜二南之後者以此臣之不得於其君子之不得於其父弟之不得於其兄朋友之不相信處之皆當以此為法如屈原不忍其憤懐沙赴水此賢者過之也賈誼云厯九州而相其君兮何必懐此都也則又失之逺矣讀詩須合如此㸔所謂詩可以興可以觀可以羣可以怨是詩中一箇大義不可不理㑹得也李閎祖錄又問柏舟詩静言思之不能奮飛似猶未有和平意曰也只是如此説無過當處既有可怨之事亦須還他有怨底意思終不成只如平時却與土木相似只㸔舜之號泣於旻天更有甚於此者喜怒哀樂但𤼵之不過其則耳亦豈可無聖賢處憂患只要不失其正如綠衣言我思古人實獲我心這般意思却又分外好錢木之録孟子詩云憂心悄悄愠于羣小孔子也肆不殄厥愠亦不殞厥問文王也悄悄憂貌愠怒也本言衛之仁人見怒於羣小孟子以為孔子之事可以當之肆𤼵語辭殞墜也問聲問也本言太王事昆夷雖不能殄絶其愠怒亦不自墜其聲問之美孟子以為文王之事可以當之集注孟子曰憂心悄悄愠于羣小孔子也肆不殄厥愠亦不殞厥問文王也夫肆不殄厥愠亦不愠厥問此大雅緜之八章所以言文王者如此孟子以是稱文王無足怪者若憂心悄悄愠于羣小此則衞邶柏舟之詩也何與孔子而孟子以此稱孔子何也曰此不必疑如見毁於叔孫㡬害於桓魋皆愠于羣小也辭則得詩意絶非孔子之事故孟子以此言孔子至於緜詩肆不殄厥愠之語注謂説文王以詩攷之上文正説太王下文豈得便言文王如此意其間須有闕文若以為太王事則下文却有虞芮質厥成之語熹嘗作詩觧至此亦曽不説竇從周錄所論緑衣篇意極温厚得學詩之本矣但添入外来意思太多致本文本意反不條暢此集𫝊所以於諸先生之言有不敢盡載者也答劉清之書我思古人實獲我心言古人所為恰與我相合只此便是至善前乎千百世之已往後乎千百世之未来只是此箇道理孟子所謂得志行乎中國若合符節政謂是爾沈僴録潘時舉説燕燕詩云前三章但見荘姜拳拳於戴媯有不能已者及四章乃見荘姜於戴媯非是情愛之私由其有塞淵温恵之徳能自淑謹其身又能以先君之思而勉已以不忘則見戴媯平日於荘姜相勸勉以善者多矣故於其歸而愛之若此無非情性之正也先生頷之潘時舉錄詩有説得曲折後好㡳有只恁地平直説後自好㡳如燕燕末後一章這不要㸔上文攷下章便知得是恁地意思自是髙逺自是説得那人着黄義剛録潘時舉説日月終風二篇據集傳云當在燕燕之前以時舉觀之終風當在先日月當次之燕燕是荘公死後之詩當居最後盖詳終風之辭荘公於荘姜猶有往来之時但不暴則狎荘姜不能堪耳至日月則見荘公已絶不顧莊姜而莊姜不免微怨矣以此觀之則終風當先而日月當次先生云恐或如此潘時舉録論語不忮不求何用不臧忮害也求貪也臧善也言能不忮不求則何為不善乎此衛風雄雉之篇孔子引之以美子路也吕氏曰貧與富交强者必忮弱者必求集注谷風詩四章就其深矣方之舟之就其淺矣泳之游之集傳以為興體時舉疑是比體未知如何答曰若無下面四句即是比既有下四句則只是興矣凡此類皆然非獨此章也荅潘時舉問昔育恐育鞠張子之説固善然推之下文及爾顛覆之云意不甚貫不若前説為順答曰姑存異義耳然舊説亦不甚眀白也答吴必大㸔詩義理外更好㸔他文章且如谷風他只是如此説出来然而叙得事曲折先後皆有次序而今人費盡氣力去做尚做得不好黄義剛録陳埴問式微詩以為勸耶戒耶曰亦不必如此㸔只是随他當時所作之意如此便與存在也可以見得有羈旅狼狽之君如此而方伯連帥無救䘏之意如今人多被止乎禮義一句泥了只管去曲説且要平心㸔詩人之意如北門之詩只是説官卑禄薄無可如何錢木之錄問簡兮詩張子謂其迹如此而其中固有以過人者夫能卷而懷之是固可以為賢然以聖賢出處律之恐未可以為盡善曰古之伶官亦非甚賤其所執者猶是先王之正樂故獻工之禮亦與之交酢但賢者而為此則自不得志耳潘時舉錄下同問泉水篇駕言出遊以寫我憂注云安得出遊於彼而寫其憂哉恐此莫只是箇思歸不得故欲出遊於國以寫其憂否曰夫人之遊亦不可輕出只是思遊於彼地耳問北風末章謂莫赤匪狐莫黑匪烏狐與烏不知詩人以比何物曰不但指一物而言當國将危亂時凡所見者無非不好㡳景象也問静女注以此詩為淫奔期㑹之詩以静為閒雅之意不知淫奔之人方相與狎溺又何取乎閒雅曰淫奔之人不知其為可醜但見其為可愛耳以女而俟人於城隅安得謂之閒雅而此曰静女者猶日月詩所謂徳音無良也無良則不足以為徳音矣而此曰徳音亦愛之之辭也問二子乗舟注取太史公語謂二子與申生不明驪姬之過同其意似取之未知如何曰太史公之言有所抑揚謂三人皆惡傷父之志而終於死之其情則可取雖於理未為當然視夫父子相殺兄弟相戮者則大相逺矣同上問君子偕老象之揥也字書云揥整髻釵也是不答曰不識此物姑依舊説字書之説亦與古注不殊也或補脱中附之答吴必大定之方中景山與京景山乃山名與商頌陟彼景山之景山同劉砥録詩所謂星言夙駕説於桑田古人戴星而出戴星而入必是自耐勞苦方能率得人徐㝢錄定之方中匪直也人言非特人化其徳而有塞淵之美至於物被其功亦至衆多之盛也答劉玶書先生問文蔚曰干旄詩彼姝者子指誰而言對曰集傳言大夫乗此車馬以見賢者賢者言車中之人徳美如此我将何以告之曰此依舊是用小序説此只是傍人見此人有好善之誠曰彼姝者子何以告之盖指賢者而言也如此説方不費力今若如集傳説是説斷了再起覺得費力陳文蔚錄問淇奥一篇衛武公進徳成徳之序始終可見一章言切磋琢磨則學問自修之功精宻如此二章言威儀服飾之盛有諸中而形諸外者也三章言如金錫圭璧則鍛鍊已精温純深粹而徳器成矣前二章皆有瑟僴赫喧之詞三章但言寛綽戲謔而已於此可見不事矜持而周旋自然中禮之意曰説得甚善衛武公學問之功甚不茍年九十五嵗猶命羣臣使進規諫至如抑詩是他自警之詩後人不知遂以為戒厲王畢竟周之卿士去聖人近氣象自是不同且如劉文公謂民受天地之中以生便説得這般言語出同上大學詩云曕彼淇奥綠竹猗猗有斐君子如切如磋如琢如磨瑟兮僴兮赫兮喧兮有斐君子終不可諠兮如切如磋者道學也如琢如磨者自修也瑟兮僴兮者恂慄也赫兮喧兮者威儀也有斐君子終不可諠兮者道盛徳至善民之不能忘也淇水名奥隈也猗猗美盛貌興也斐文貌切以刀鋸琢以椎鑿皆裁物使成形質也磋以鑢錫磨以沙石皆治物使其滑澤也治骨角者既切而復磋之治玉石者既琢而復磨之皆言其治之有緒而益致其精也瑟嚴宻之貌僴武毅之貌赫喧宣著盛大之貎諠忘也道言也學謂講習討論之事自修者省察克治之功恂慄戰懼也威可畏也儀可象也引詩而釋之以明明明徳者之止於至善道學自修言其所以得之之由恂慄威儀言其徳容表裏之盛卒乃指其實而歎美之也章句曰復引淇奥之詩何也曰上言止於至善之地備矣然其所以求之之方與其得之之騐則未之及故又引此詩以𤼵眀之也夫如切如磋言其所以講於學者已精而益求其精也如琢如磨言其所以修於身者已宻而益求其宻也此其所以擇善固執日就月将而得止於至善之由也恂慄者嚴敬之存乎中也威儀者光輝之著乎外也此其所以晬面盎背施於四體而為止於至善之騐也盛徳至善民不能忘盖人心之所同然聖人既先得之而其充盛宣著又如此是以民皆仰之而不能忘也盛徳以身之所得而言也至善以理之所極而言也切磋琢磨求其止於是而已矣曰切磋琢磨何以為學問自修之别也曰骨角脉理可尋而切磋之功易所謂始條理之事也玉石渾全堅確而琢磨之功難所謂終條理之事也或問論語子貢曰詩云如切如磋如琢如磨其斯之謂與不切則磋無所施不琢則磨無所措故學者雖不可安於小成而不求造道之極致亦不可騖於虛逺而不察切已之實也集注問琢磨後更有瑟僴赫喧何故為終條理之事曰那不是做工夫處是成就了氣象恁地穆穆文王亦是氣象也徐㝢錄如切如磋如琢如磨前人説此詩不快暢只東坡云磋者切之至磨者琢之詳自粗以及精也周謨録詩録木瓜即春秋序績之意亦以善衞人之情也豈以齊桓之事為盡可法哉讀尊孟辨徐容問絜矩一條曰如詩裏説大夫行役無期度不得以養其父母到得使下也須教他内外無怨始得如東山出車枤杜諸詩説行役多是序其室家之情亦欲使凡在上者有所感動葉賀孫錄同下君子陽陽詩不作淫亂説如何曰有箇君子于役如何别将這箇做一様説由房只是人出入處古人屋於房處前有壁後無壁所以通内所謂焉得萱草言樹之背盖房之北也問碩鼠狡童之刺其君不已甚乎曰碩鼠刺君重斂盖暴取虐民民怨之極則将視君如寇仇故𤼵為怨上之辭至此若狡童詩本非是刺忽才做刺忽便費得無限杜撰説話鄭忽之罪不至已甚往往如宋襄這般人大言無當有甚狡處狡童刺忽全不近傍些子若鄭突却是狡詩意本不如此聖人云鄭聲淫盖周衰惟鄭國最為淫俗故諸詩多是如此東莱将鄭忽深文詆斥得可畏並同上先生問曹叔遐狡童詩如何説對曰陳先生以此詩不是刺忽但詩人説他人之言如彼狡童兮不與我言兮惟子之故使我不能餐兮言狡童不與我言則已之曰又去上面添一箇休字也這詩只是國人當時淫奔故其言鄙俚如此非是為君言也黄有開記中庸詩曰衣錦尚絅惡其文之著也故君子之道闇然而日章小人之道的然而日亡詩國風衛碩人鄭之丰皆作衣錦褧衣褧絅同襌衣也尚加也古之學者為已故其立心如此尚絅故闇然衣錦故有日章之實章句問絅衣之制曰古注以為襌衣所以襲錦衣者又問禪與單字同異曰同沈存中謂絅與麻同是用麻織疏布為之不知是否輔廣錄衣錦尚絅絅襌衣也其制疏眼之物或曰絅頃通用頃麻織疏布為之萬人傑别録園有桃似比詩孟子詩曰不素餐兮素空也無功而食禄謂之素餐集注蟋蟀自做起㡳詩山有詩自做到㡳詩皆人所自作黄升卿録轔轔車聲與詩有車鄰鄰字同楚辭集注誶諫也詩曰誶予不顧今詩作訊訊告也同上問豳詩本風而周禮籥章氏祈年于田祖則吹豳雅蜡祭息老物則吹豳頌不知就豳詩觀之其孰為雅孰為頌曰先儒因此説而謂風中自有雅自有頌雖程子亦謂然似都壊了詩之六義然有三説焉一説謂豳之詩吹之其調可以為風可以為雅可以為頌一説謂楚茨大田甫田是豳之雅噫嘻載芟豐年諸篇是豳之頌謂其言田之事如七月也如王介甫則謂豳之詩自有雅頌今皆亡矣數説皆通恐其或然未敢必也楊道夫録七月一詩而備三體乃鄭氏不逹周禮籥章之義而生此鑿説不足據信今攷周禮不遺餘力而反信此何耶答徐彦章問東萊吕氏曰十月而曰改嵗三正之通於民俗尚矣周特舉而迭用之耳據七月詩如七月流火之類是用夏正一之日觱𤼵之類是周正即不見其用商正而吕氏以為舉而迭用之何也曰周歴夏商其未有天下之時固用夏商之正朔其國僻逺無純臣之義又自有私紀其時月者故三正皆曽用之也無純臣語恐記誤潘時舉録鵜鴂即詩所謂七月鳴鵙者盖鴂鵙聲相近又其聲惡隂氣至則先鳴而草死也楚辭集注孟子曰民事不可緩也詩云晝爾于茅宵爾索綯亟其乗屋其始播百榖于往取也綯絞也亟急也乗升也播布也言農事至重人君不可以為緩而忽之故引詩言治屋之急如此者盖以来春将復始播百榖而不暇為此也集注問躋彼公堂稱彼兕觥民何以得升君之堂曰周初國小君民相親其禮樂法制未必盡備而民事之艱難君固盡得以知之成王之時禮樂備法制立然但知為君之尊而未必知為國之初此等意思也故周公特作此詩使之因是以知民事也潘時舉録因論鴟鴞詩遂問周公使管叔監殷豈非以愛兄之心勝故不敢疑之耶曰若説不敢疑則已是有可疑者矣盖周公以管叔是吾之兄事同一體今既克商使之監殷又何疑焉非是不敢疑乃是即無可疑之事也不知他自差異乃造出一件事周公為之奈何哉董銖云孟子所謂周公之過不亦宜乎者正謂此也曰然同上吴必大問周公作鴟鴞之詩以遺成王其辭艱苦深奥不知成王當時何故便理㑹得曰當時事變在眼前故讀其詩者便知其用意所在自今讀之既不及見當時事所以謂其詩難曉然成王雖得此詩亦只是未敢誚公其心未必能遂無疑及至風雷之變唘金縢之書然後釋然開悟先生却問必大曰成王何以知有金縢後去唘之必大曰此二公賛之也又問二公何故許時不説若雷不響風不起時又如何曰聞之吕大著云此見二公工夫處二公在裏面調䕶非一日矣但他人不得而知爾曰伯恭愛説一般如此道理必大却請問其説畢竟如何曰是時周公握了大權成王自是轉動周公未得便假無風雷之變周公亦須别有道理吴必大録或問鴟鴞詩既取我子無毁我室解者以為武庚既殺戒管蔡不可復亂我王室不知是如此否畢竟當初是管蔡挾武庚為亂武庚是紂子豈有父為人所殺而其子安然視之不報仇者曰詩人之言只得如此不成歸怨管蔡周公愛兄只得如此説自是人情是如此不知當初何故忽然使管蔡去監他做出一場大疎脱如此合天下之力以誅紂了却使出自家屋裏人自做出這一場大疎脱這箇是周公之過無可疑者然當初周公使管蔡者想見那時是好在必不疑他後来有這様事管蔡必是後来被武庚與商之頑民每日将酒去灌啗他乗醉以語言離間之曰你是兄却出来在此周公是弟反執大權以臨天下管蔡獃想得被這㡬箇唆動了所以流言説公将不利於孺子這箇都是武庚與商之頑民教他所以使得這管蔡如此後来周公所以做酒誥丁寧如此必是當日因酒做出許多事其中間想煞有説話而今書𫝊只載得箇大槩其巾更有㡬多機變曲折在沈僴録鴟鴞鴟鴞既取我子毋毁我室當時也是被他害得猛如常棣一詩便是後来制禮作樂時作這是先被他害所以當天下平定後更作此語故其辭獨哀切不似諸詩和平黄義剛録詩辭多是出於當時鄉談鄙俚之語雜而為之如鴟鴞詩云拮据将荼之語皆此類也又云此詩乃周公為之不知其義如何然周公所言多聱牙難攷如書巾周公之言便難讀如立政君奭之篇是也黄冇閒記余正甫云宵行自是夜光之蟲夜行於地熠燿言其光耳非螢也葉賀孫録陳淳問破斧詩𫝊云被堅執鋭皆聖人之徒似未可謂聖人之徒曰不是聖人之徒時便是賊徒又曰如破斧詩却是一箇好話頭而今却只去理㑹那聖人之徒便是不曉黄義剛録下同破斧詩須看周公東征四國是皇見得周公用心始得這箇却是箇好話頭先生謂陳淳曰公當初説破斧詩熹不合截得緊了不知更有甚疑對曰當初只是疑被堅執鋭是麤人如何謂聖人之徒曰有麤㡳聖人之徒亦有讀書識理㡳盜賊之徒並同上破斧詩㸔聖人這般心下詩人直是形容得出這是答東山之詩古人做事茍利國家雖殺身為之而不辭如今人箇箇計較利害㸔你四國如何不安也得不寧也得只且護了我斨我斧莫待缺壊了此詩説出極分眀毛注却云四國是管蔡商奄詩裏多少處説四國如正是四國之類猶言四海他却不照這例自恁地説葉賀孫録中庸詩云伐柯伐柯其則不逺執柯以伐柯睨而視之猶以為逺柯斧柄也則法也睨邪視也言人執柯伐木以為柯者彼柯長短之法在此柯耳然猶有彼此之别故伐者視之猶以為逺也章句九罭詩分眀是東人願其東故致願留之意公歸豈無所乎汝但暫寓信宿耳公歸将不復来乎汝但暫寓信處耳是以有衮衣兮是以兩字如今都不説盖本謂緣公暫至於此是以此間有披衣之人無以我公歸兮無使我心悲兮其為東人願留之詩豈不甚眀白止縁序有刺朝廷不知之句故後之説詩者悉委曲附㑹之費多少詞語到㡳鶻突熹嘗謂死後千百年須有人知此意自㸔来直是盡見得聖人之心葉賀孫録寛厚温柔詩教也若如今人説九罭之詩乃責其君之辭何處討寛厚温柔之意同上狼䟦其胡載疐其尾此興是反説亦有些意義略似程子之説但程子説得深如云狼性貪之類公孫碩膚如言幸敵營及北狩之意言公之被毁非四國之流言乃公自遜此大美耳此古人善於辭命處吴必大録狼性不能平行每行首尾一俯一仰首至地則尾舉向上胡舉向上則尾疐至地故曰狼䟦其胡載疐其尾沈僴錄問公孫碩膚注以為此乃詩人之意言此非四國之所為乃公自遜其大美而不居耳盖不使讒邪之口得以加乎公之忠聖此可見其愛公之深敬公之至云云㸔来詩人此意也囘互委曲却太傷巧得来不好曰自是作詩之體當如此詩人只得如此説如春秋公孫于齊不成説昭公出奔聖人也只得如此書自是體當如此同上問公孫碩膚集傳之説如何曰魯昭公分眀是為季氏所逐春秋却書云公孫于齊如其自出云爾是此意吴必大錄變風中固多好詩雖其間有沒意思者然亦須得其命辭遣意處方可觀後人硬自做箇道理鮮説於其造意下語處元不及究只後代文集中詩亦多不解其辭意樂府中羅敷行羅敷即使君之婦使君即羅敷之夫其曰使君自有婦羅敷自有夫正相戲之辭其曰夫壻從東来千騎居上頭觀其氣象即使君也後人亦錯解了須得其辭意方見其好笑處同上蘇氏陳靈以後未嘗無詩之説似可取而有病盖先儒所謂無詩者固非謂詩不復作也但謂夫子不取耳康節先生云自從刪後更無詩者亦是此意蘓氏非之亦不察之甚矣故熹於集傳中引蘓氏之説而繫之曰愚謂伯樂之所不顧則謂之無馬可矣夫子之所不取則謂之無詩可矣正𤼵眀先儒之意也大抵二蘓識論皆失之太快無先儒淳實氣象不奈咀嚼所長固不廢然亦不可不知其失也十五國風次序恐未必有意而先儒及近世諸先生皆言之故集傳中不敢提起盖詭随非所安而辨論非所敢也歐陽公本末論甚佳熹亦収在後語中矣似此等且當闕之而先其所急乃為得耳答范念徳書詩傳遺説卷四
