body:
  text: 詩傳遺説詩類提要臣等謹案詩傳遺説六卷宋朱鑑編鑑有朱文公易説已著録是編乃理宗端平乙未鑑以承議郎權知興國軍事時所成葢因重槧朱子集傳而取文集語録所載論詩之語足與集傳相發明者彚而編之故曰遺説其書首綱領次序辨次六義繼之以風雅頌之論斷終之以逸詩詩譜叶韻之義以朱子之説明朱子未竟之義猶所編易𫝊例也鑑自序有曰先文公詩集傳豫章長沙后山皆有本而后山校讐最精第初脱稿時音訓間有未備刻板已竟不容増益欲著補脱終弗克就仍用舊板葺為全書補綴趲那久將漫漶朅來富川郡事餘暇輒取家本親加是正刻寘學宫國朝寧波史榮撰風雅遺音據鑑此序謂今本集傳音叶多鑑補苴非朱子所手定其説似非無因然則以音叶之誤議朱子與以朱子之故而委曲回䕶呉棫書者殆均失之矣乾隆四十五年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀詩傳遺説序先文公詩集傳豫章長沙后山皆有本而后山本讎校為最精第初脱藁時音訓間有未備刻版已竟不容増益欲著補脫終弗克就未免仍用舊版葺為全書補綴趲那久將漫漶朅来富川郡事餘暇輙取家本親加是正刻寘學宫以𫝊永久抑鑑昔在侍旁每見學者相與講論是書凡一字之疑一義之隱反復問荅切磋研究必令心通意解而後已今文集書問語録所記載無慮數十百條彚次成編題曰遺説後之讀詩者能兼攷乎此而盡心焉則無異於親承誨誘可以得其意而無疑於其言矣若七月斯干二詩書以遺丘子服者尚可攷見去取位置小序之法因附於後端平乙未五月朔孫承議郎權知興國軍兼管内勸農營田事節制屯戍軍馬鑑百拜敬識
