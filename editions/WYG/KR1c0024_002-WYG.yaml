body:
  text: 詩傳遺説卷二宋朱鑑編序辨詩序起闗雎后妃之徳也止教以化之大序起詩者志之所之也止詩之至也游儆錄詩説所欲修改處是何等類因書告略及之比亦得間刋定大抵小序盡出後人臆度若不脱此窠臼終無緣得正當也去年略修舊説訂正為多尚恨未能盡去得失相半不成全書耳荅呂祖謙書下同詩説昨已附小雅後二冊去矣小序之説未容以一言定更俟来誨却得反覆區區之意已是不敢十分放手了前諭未極更須有説話也恐尊意見得不如此處却望子細一一垂諭更容攷究為如何逐旋批示尤幸并得之却難看也近看吴才老説𦙍征康誥梓材等篇辨證極好但已看破小序之失而不敢勇決復為序文所牽亦殊覺費力耳向来所諭詩序之説不知後来尊意看得如何雅鄭二字雅恐便是大小雅鄭恐便是鄭風不應槩以風為雅又於鄭風之外别求鄭聲也聖人刪錄取其善者以為法存其惡者以為戒無非教者豈必滅其籍哉看此意思甚覺通逹無所滯礙氣象亦自公平正大無許多囘互費力處不審髙明竟以為何如也並同上問向見吕丈問讀詩之法吕丈舉横渠置心平易始知詩之説見教必大固嘗遵用其説去誦味来固有箇涵泳情性底道理然終不能有所唘𤼵程子謂興於詩便知有着力處今讀之止見其善可為法惡可為戒而已不知其他如何著力先生曰善可為法惡可為戒不特詩也他書皆然古人獨以為興於詩者詩便有感𤼵人㡳意思今讀之無所感𤼵者正是被諸儒觧殺了死着詩義興起人善意不得如南山有臺序云得賢則能立邦家之基盖為見詩中有邦家之基字故如此觧此序自是好句但纔如此説定便局了一詩之意若果先見得其本意雖如此説亦不妨正如易觧若得聖人繫辭之説便横説直説都得今斷以一義觧定易便不活詩所以能興起人處全在興如山有樞隰有榆别無意義只是興起下面子有車馬子有衣裳耳小雅諸篇皆君臣燕飲之詩道主人之意以譽賔如今人宴飲有致語之類其間有序賔荅辭者漢書載客歌驪駒主人歌客毋庸歸亦是此意古人以魚為重故魚麗南有嘉魚皆特舉以歌之儀禮載問歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀本一套事後人移魚麗附於鹿鳴之什截以嘉魚以下為成王詩遂失當時用詩之意故胡亂觧今觀魚麗嘉魚南山有臺等篇辭意皆同菁莪湛露蓼蕭皆燕飲之詩詩巾所謂君子皆稱賔客後人却以言人君正顛倒了如以湛露為恩澤皆非詩義故於野有蔓草零露湑兮亦以為君之澤不下流皆是局於一箇死例所以如此周禮以六詩教國子當時未有注觧不過教之曰此興也此比也此賦也興者人便自作興看比者人便自作比看興只是興起謂下句直説不起故将上句帶起来説如何去上頭討義理今欲觀詩不若且置小序及舊説只将元詩虛心熟讀徐徐玩味候彷彿見箇詩人本意却從此推尋将去方有感𤼵如人拾得一箇無題目詩再三熟看亦須辨得出来若被舊説一局局定便看不出今雖説不用舊説終被他先入在内不期依舊從他去熹向作詩觧文字初用小序至觧不行處亦曲為之説後来覺得不安第二次觧者雖存小序間為辨破然終是不見詩人本意後来方知只盡去小序便自可通於是盡滌蕩舊説詩意方活問讀詩記中所言雅鄭邪正之言何也曰鄭衛之音便是今􅆁鄘鄭衛之詩多道淫亂之事故曰鄭聲淫聖人存之欲以知其風俗且以示戒所謂詩可以觀者也豈以其詩為善哉伯恭謂詩皆賢者所作直陳其事所以示譏刺熹嘗問伯恭如伯恭是賢者肯作此等詩否且如今人有作詩譏刺人者在一鄉為一鄉之擾在一州為一州所惡安得謂之好人伯恭以為詩三百篇皆可被之絃歌用之饗祀今以鄭衛之詩奏之郊廟豈不褻凟用以享幽厲褒姒乃可耳施之賔客燕饗亦待好賔客不得須遇齊襄陳靈之徒乃可歌此耳不止鄭衞其餘亦皆有正有邪大序止乎禮義之言亦可疑其餘小序尤不可信多取春秋中惡諡之君以繫之如傾覆社稷曰頃故序柏舟硬差排為衛頃公之詩小心畏忌曰僖故序芄蘭為誘僖公愿而無立志之詩至如鄭風中刺詩皆繫之忽如忽者謂之迂繆則可謂之狡則不可若是狡時必就齊昬為援必能制祭仲之徒作詩序者正如山東學究見識卑陋而胡説伯恭只知黨序百般将忽来煆鍊忽在生時被人驅逐如此死後又被㡬箇秀才百般治他誠是可憐子衿之詩豈是學校中氣象褰裳詩中狂童之辭是甚意思作序者但見子太叔嘗賦此詩韓宣子曰􅁸在此敢勞子至他人乎便以為思大國之正已不知古人賦詩但借其言以寓已意小序中如此等處極好笑伯恭詩記綱目中第一條注謝氏之説只是𤼵明得一箇怨而不怒㡳意思此所謂可以怨者也詩之義不止此可以興可以觀可以羣却都沒而不説只此便瞎了詩眼同上或有問於余曰詩何為而作也余應之曰人生而静天之性也感於物而動性之欲也夫既有欲矣則不能無言既有言矣則言之所不能盡而𤼵於咨嗟詠歎之餘者必有自然之音響節族而不能已焉此詩之所以作也曰然則其所以教者何也曰詩者人心之感物而形於言之餘也心之所感有邪正故言之所形有是非惟聖人在上則其所感者無不正而其言皆足以為教其或感之之雜而所𤼵不能無可擇者則上之人必思所以自反而因有以勸懲之是亦所以為教也昔周盛時上自郊廟朝廷而下逹於鄉黨閭巷其言粹然無不出於正者聖人固已協之聲律而用之鄉人用之邦國以化天下至於列國之詩則天子廵守亦必陳而觀之以行黜陟之典降自昭穆而後浸以陵夷至於東遷而遂廢不講矣孔子生於其時既不得位無以行帝王勸懲黜陟之政於是特舉其籍而討論之刪其重複正其紛亂而其善之不足以為法惡之不足以為戒者則亦刋而去之以從簡約示久逺使夫學者即是而有以攷其得失善者師之而惡者改之是以其政雖不足行於一時而其教實被於萬世是則詩之所以為教者然也曰然則國風雅頌之體其不同若是何也曰吾聞之凡詩之所謂風者多出於里巷歌謡之作所謂男女相與詠歌各言其情者也惟周南召南親被文王之化以成徳而人皆有以得其情性之正故其𤼵於言者樂而不過於淫哀而不及於傷是以二篇獨為風詩之正經自邶而下則其國之治亂不同人之賢否亦異其所感而𤼵者有邪正是非之不齊而所謂先王之風者於此焉變矣若夫雅頌之篇則皆成周之世朝廷郊廟樂歌之詞其語和而荘其義寛而宻其作者往往聖人之徒固所以為萬世法程而不可易者也至於雅之變者亦皆一時賢人君子閔時病俗之所為而聖人取之其忠厚惻怛之心陳善閉邪之意尤非後世能言之士所能及之此詩之為經所以人事浹於下天道備於上而無一理之不具也曰然則其學之也當奈何曰本之二南以求其端参之列國以盡其變正之於雅以大其規和之於頌以要其止此學詩之大㫖也於是乎章句以綱之訓詁以紀之諷詠以昌之涵泳以體之察之情性隠微之間審之言行樞機之始則修身及家平均天下之道其亦不待他求而得之於此矣問者唯唯而退余時方輯詩𫝊因悉次是語以冠其篇云文集詩𫝊舊序案此乃先生丁酉嵗用小序觧詩時所作後乃盡去小序故附見於辨吕氏説之前詩自齊魯韓氏之説不得𫝊而天下之學者盡宗毛氏毛氏之學𫝊者亦衆而王述之類今皆不存則推衍其説者又獨鄭氏之箋而已唐初諸儒為作䟽義因訛踵陋百千萬言而不能有以出乎二氏之區域至於本朝劉侍讀歐陽公王丞相蘓黄門河南程氏横渠張氏始用已意有所𤼵明雖其淺深得失有不能同然自是之後三百五篇之微詞奥義乃可得而尋繹盖不待講於齊魯韓氏之𫝊而學者也知詩之不専於毛鄭矣及其既久求者益衆説者愈多同異紛紜争立門户無復推遜祖述之意則學者無所適從而或反以為病今觀吕氏家塾之書兼緫衆説巨細不遺挈領提綱首尾該貫既足以息夫同異之爭而其述作之體則雖融㑹通徹渾然若出於一家之言而一字之訓一事之義亦未嘗不謹其説之所自及其斷以已意或雖超然出於前人意慮之表而謙遜退託未嘗敢有輕議前人之心也嗚呼如伯恭父者真可謂有意乎温柔敦厚之教矣學者以是讀之則於可羣可怨之㫖其庶㡬乎雖然此書所謂朱氏者實熹少時淺陋之説而伯恭父誤有取焉其後歴時既久自知其説有所未安如雅鄭邪正之云者或不免有所更定則伯恭父反不能不致疑於其間熹竊惑之方将相與反復其説以求真是之歸而伯恭父已下世矣嗚呼伯恭父已矣若熹之衰頽汨沒其勢又安能復有所進以獨決此論之是非乎伯恭父之弟子約既以是書授其兄之友丘侯宗卿而宗卿将為板本以𫝊永久且以書来属熹序之熹不能也乃略為之説因并附其所疑者以與四方同志之士共之而又以識予之悲恨云爾文集吕氏家塾讀詩記後序壬寅作詩體不同固有鋪陳其事不加一詞而意自見者然必其事之猶可言者若清人之詩是也至於桑中溱洧之篇則雅人荘士有難言之者矣孔子之稱思無邪也以為詩三百篇勸善懲惡雖其要歸不出於正然未有若此言之約且盡者耳非以作詩之人所思皆無邪也今必曰彼以無邪之思鋪陳淫亂之事而閔惜懲創之意自見於言外則曷若曰彼雖以有邪之思作之而我以無邪之思讀之則彼之自状其醜者乃所以為吾警懼懲創之資邪而况曲為訓説而求其無邪於彼不若反而得之於我之易也巧為辨數而歸其無邪於彼不若反而責之於我之切也若夫雅也鄭也衛也求之諸篇固各有其目矣雅則大雅小雅若干篇是也鄭則鄭風若干篇是也衛則􅆁鄘衛風若干篇是也是則自衛反魯以来未之有改而風雅之篇説者又有正變之别焉至於桑中小序政散民流而不可止之文與樂記合則是詩之為桑間又不為無所據者今必曰三百篇皆雅而大小雅不獨為雅鄭風不為鄭􅆁鄘衛之風不為衛桑中不為桑間亡國之音則其篇帙混亂邪正錯糅非復孔子之舊矣夫二南正風房中之樂也鄉樂也二雅之正朝廷之樂也商周之頌宗廟之樂也是或見於序義或出於𫝊記皆有可攷至於變雅則固已無施於事而變風又特里巷之歌謡其領在樂官者以為可以識時變觀土風而賢於四夷之樂耳今必曰三百篇者皆祭祀朝聘之所用則未知桑中溱洧之属當以薦何等之鬼神接何等之賔客邪盖古者天子廵守命太師陳詩以觀民風固不問其美惡而悉陳以觀也既已陳之固不問其美惡而悉存以訓也然其與先王雅頌之正篇帙不同施用亦異如前所陳則固不嫌於厖雜矣今於雅鄭之實察之既不詳於厖雜之名畏之又太甚顧乃引夫淫放之鄙詞而文以風刺之美説必欲强而置諸先王雅頌之列是乃反為厖雜之甚而不自知也夫以夷部與鄭衛合奏猶曰不可而況强以桑中溱洧為雅樂又欲合於鹿鳴文王清廟之什而奏之宗廟之中朝廷之上乎其以二詩為猶止於中聲者太史公所謂孔子皆絃歌之以求合於韶武之音其誤盖亦如此然古樂既亡無所攷正則吾不敢必為之説獨以其理與其詞推之有以知其必不然耳又以為近於勸百諷一而止乎禮義則又信大序之過者夫子虛上林侈矣然自天子芒然而思以下猶實有所謂諷也漢廣知不可而不求大車有所畏而不敢則猶有所謂禮義之止也若桑中溱洧則吾不知其何詞之諷而何禮義之止乎若曰孔子嘗欲放鄭聲矣不當於此又収之以備六籍也此則曽南豐於戰國䇿劉元城於三不足之論皆嘗言之又豈俟吾言而後白也哉大抵吾説之病不過得罪於桑間洧外之人而其力猶足以全先王之樂彼説而善則二詩之幸甚矣抑其於溱洧而取范氏之説則又似以鄭聲者豈理之自然固有不可奪邪因讀桑中之説而惜前論之不及竟又痛伯恭之不可作也因書其後以為使伯恭父而聞此雖未必遽以為然亦當為我逌然而一笑也嗚呼悲夫文集讀吕氏詩記桑中篇甲辰春作詩説久已成書無人寫得不能奉寄亦見子約専治小序而不讀詩故自度其説未易合而不寄耳謂變風止乎禮義其失甚明但若只以小序論之則未見其失耳讀古人書直是要虛著心大著胆髙著眼方有少分相應若左遮右攔前拖後拽随語生觧節上生枝則更讀萬卷書亦無用處也丁未荅吕祖儉書嘗攷之書詩而得其小序之失参稽本末皆有明騐私竊以為不當引之以冠本經聖言之上是以不量鄙淺輒加緒正刋刻布流以曉當世刋四經成告先聖文鄭康成説南陔等篇遭秦而亡其義則與衆篇之義合編故存至毛公為詁訓𫝊乃分衆篇之義各置於其篇端愚案鄭氏謂三篇之義本與衆編之義合編者是也然遂以為詩與義皆出於先秦詩亡而義猶存至毛公乃分衆義各置篇端則失之矣後漢衛宏𫝊明言宏作毛詩序則序豈得為與經並出而分與毛公之手哉然序之本不冠於篇端則因鄭氏此説而可見熹嘗病今之讀詩者知有序而不知有詩也故因其説而更定此本以復於其初猶懼覽者之惑也又備論於其後云題漳州所刋四經後紹興庚戌書學者當興於詩須先去了小序只将詩本文熟讀玩味仍不可先看諸家注觧看得久之自然認得此詩是説箇甚事謂如拾得箇無題目詩説此花既白又香是盛寒開必是梅花詩卷阿詩召康公戒成王其説只始説箇好意思如豈弟君子皆指成王純嘏爾常之類皆説優游享福之事至有馮有翼以下方説用賢大抵告人之法亦當如此須先令人歆慕此事則其肯從吾言必樂為之矣萬人傑錄説纔觧得宻便説他不着國史明乎得失之迹一句也有病周禮禮記中史並不掌詩左傳説自分曉以此見得大序亦未必是聖人做小序更不消説他做小序不㑹寛説每篇便求一箇實事填塞了他有尋得着㡳猶自可通不然便與説相礙那觧㡳要説詩却礙序要就序便礙詩詩之興是劈頭説那沒巴鼻地兩句下面方是説他那事這箇如何通觧鄭聲淫所以鄭聲多是淫佚之事狡童将仲子之類是也今喚做忽與祭仲與詩辭全不相似這箇只似如今一般閒潑曲子南山有臺等數篇是享時常用㡳叙賔主相好之意一似今人致語㬊淵别錄書小序亦非孔子作與詩小序同輔廣錄詩書序當刋在後面楊與立編語略下同㸔詩不當只管去序中討只當於詩辭中吟詠㸔教活絡貫通方得詩小序全不可信如何定知是美刺那人毛公全無序觧鄭間見之並同上詩小序或是後漢衛宏作大序亦不是子夏作煞有礙義理誤人處周謨錄詩序東漢儒林傳分明説道是衛宏作後来經意不明都是被他壊了熹又看得不是衛宏一手多是兩三手合成一序愈説愈疎浩對曰蘓子由却不取小序曰他雖不取下面言語留了上面一句便是病根吕伯恭専信序文不免牽合又云伯恭凡百長厚不肯非毁前輩須要出脱囘䕶到了不知道只為得箇觧經人却不曽為得聖人本意是便道是不是便道不是方得邵浩别錄小序漢儒所作有可信處絶少大序好處多然亦有不滿人意處竇從周錄詩本易明只被前面序作梗序出於漢儒反亂詩本意且只将四字成句㡳詩讀却自分曉見作詩集傳待取詩令編排放前面驅序過後他自作一處陳文蔚錄蘓氏詩傳比之諸家差為簡直但亦看小序不破終覺有惹絆處耳荅吴必大問先生詩集傳多不觧序何也曰熹自二十嵗時讀詩便覺小序無意義及去了小序只去玩味詩辭却又覺得道理貫徹當時初亦嘗質問諸鄉先生皆云序不可廢而熹之疑終不能釋其後斷然知小序之出於漢人所作其為謬戾有不可勝言東莱不合只因序講觧便有許多牽强處熹嘗與之言終不肯信從讀詩記中雖多説序然亦有説不行處亦廢之熹因作詩序辨説其他謬戾則辨之頗詳周謨詳徐昭然問先生去詩序似使學者難曉曰正為有序則反糊塗盖小序後人揣料有不是處多如今之杜詩之類本是雪却題作月詩後人不知亦强要把做月詩觧了故大害事蔡念成述李燔所聞聖人有法度之言如春秋書與周禮字較實詩無理㑹只是看大意若要将序去讀便礙了問變風變雅如何曰也是後人恁地説今也只是依他恁地説如周南漢廣汝墳諸詩皆是説婦人如此則是文王之化只化及婦人不化及男子只看他大意恁地拘不得徐㝢錄大序只有六義之説是而程先不知如何又却説從别處去如小序亦間有説得好處只是杜撰處多不知先儒何故不虛心子細㸔這道理便只恁説却後人又只依他那箇説去亦不看詩是有此意無若説不去處乂須穿鑿説将去又詩人當時多有唱和之辭如是者有數十篇序中都説從别處去且如蟋蟀一篇本其風俗勤儉其民終嵗勤勞不得少休及嵗之暮方相與燕樂而又遽相戒曰日月其除無已太康盖謂今雖不可以不為樂然不已過於樂乎其憂深思逺固如此至山有樞一詩特以和荅其意而觧其意耳故説山則有樞矣隰則有榆矣子有衣裳弗曳弗婁子有車馬弗馳弗驅一旦宛然以死則他人藉之以為樂耳所以觧勸他及時而樂也而序蟋蟀者則曰刺晉僖公儉不中禮盖風俗之變必由上以及下今謂君之儉反過於禮而民之俗猶知用禮則必無是理也至山有樞則以為刺晉昭公又大不然矣若魚藻則天子燕諸侯而諸侯美天子之詩也采菽則天子所以答魚藻矣至鹿鳴則燕享賔客也序頗得其意四牡則勞使臣也而詩序下文則妄矣皇皇者華則遣使臣之詩也棠棣則燕兄弟之詩也序固得其意伐木則燕朋友故舊之詩也人君以鹿鳴而下五詩燕其臣故臣受君之賜者則歌天保之詩以荅其上天保之序雖略得此意而古註言鹿鳴至伐木皆君所以下其臣臣亦歸美於王崇君之尊而福禄之以荅其歌却説得尤分明又如行葦自是祭畢而燕父兄耆老之詩首章言開燕設席之初而殷勤篤厚之意已見於言語之外二章言侍御獻酬飲食歌樂之盛三章言既燕而射以為歡樂末章祝頌其既飲此酒皆得享夫長壽今序者不知本㫖見有勿踐履之説則便謂仁及草木見戚戚兄弟便謂親睦九族見黄耉台背便謂養老見以祈黄耇便謂乞言見介爾景福便謂成其福禄細細碎碎殊無倫理其失為尤甚也既醉則父兄所以答行葦之詩也鳬鷖則祭之明日繹而賔尸之詩也古者宗廟之祭皆有尸既祭之明日則煖其祭食以燕為尸之人故有此詩假樂則公尸之所以答鳬鷖也今序篇皆失之又曰詩今所謂樂章雖有唱和之意祇是樂工代歌亦非是君臣自歌也楊道夫錄問大序先王以是經夫婦傳曰先王謂文武周公成王竊謂二南雅頌固多周公時所作然遂謂周公謂先王則恐讀者不能無疑答曰此無甚害盖周公實行王事制禮樂若止言成王則失其實矣答吴必大問止乎禮義如何曰詩大綱有止乎禮義者如柏舟等詩是也若桑中之類如何喚做止乎禮義得吴必大錄變風止乎禮義如泉水載馳固止乎禮義如桑中有甚禮義大序只是揀好㡳説亦未盡陳淳錄問聲成文謂之音曰歌永言聲依永便是聲律和聲便是成文謂之音吕徳明錄問詩盡撤去小序何也曰小序如碩人定之方中等見於左傳者自可無疑若其他刺詩無所據多是世儒将他諡號不美者挨就立名爾今只考一篇見是如此故其他皆不敢信且如蘓公刺暴公固是姓暴者萬一不見得是暴公則惟暴之云者只作一箇狂暴㡳人説亦可又如将仲子如何便見得是祭仲熹由此見得小序大故是後世陋儒所作但既是千百年已往之詩今只見得大意便了又何必要指實其人姓名於看詩有何益也余大雅録大扺今人説詩多去辨他序變要求著落至其正文闗闗雎鳩之義却不與理㑹王徳修云詩序只是國史一句可信如闗雎后妃之徳也此下即講師説如蕩詩自是説蕩蕩上帝序却言是天下蕩蕩賚詩自是説文王既勤止我應受之是説後世子孫領其祖宗基業之意他序却説賚予也豈不是後人多被講師瞞耶曰此是蘓子由曽説来然亦有不通處如漢廣徳廣所及也有何義理却是下面無思犯禮求而不可得㡬句却有理若熹只上一句亦不敢信他舊曽有一老儒鄭漁仲興化人更不信小序只依古本與疊在後面熹今亦如此令人虛心㸔正文久之其義自見盖所謂序者類多世儒之談不觧詩人本意處甚多且如止乎禮義果能止禮義否桑中之詩禮義在何處徳修曰他要存戒曰此正文中無戒意只是直述他淫亂事爾若鶉之奔奔相鼠等詩却是譏罵可以為戒此則不然熹今看得鄭詩自叔于田等詩之外如狡童子衿等篇皆淫亂之詩而説詩者誤以為刺昭公刺學校廢耳衛詩尚可猶是男子戲婦人鄭詩則不然多是婦人戲男子所以聖人尤惡鄭聲也出其東門却是箇識道理底人做同上詩序實不足信向来見鄭漁仲有詩辨妄力詆詩序其間言語雖太甚以為皆是村野妄人所作始者亦疑之後来子細㸔一兩篇因質之史記國語然後知詩序之果不足信因是㸔行葦賔之初筵抑數篇序與詩全不相似以此㸔其他詩序其不足信者煞多以此知人不可説亂話便都被人㸔破了大率詩人假物興辭大率将上句引下句如行葦勿踐履戚戚兄弟莫逺具爾行葦是比兄弟勿字乃訓莫字此詩自是飲酒㑹賔之意序者却牽合作周家忠厚之詩遂以行葦為仁及草木如云酌以大斗以祈黄耉亦是歡洽之時祝夀之意序者遂以為養老乞言豈知祈字本只是祝頌其髙夀無乞言意也抑詩中間煞有好語亦非刺厲王如於乎小子豈是以此指其君兼厲王是暴虐大惡之主詩人不應不述其事實只說謹言節語況厲王無道謗訕必不容武公如何恁地指斥曰小子國語以為武公自警之詩却是可信大率古人作詩與今人作詩一般其間亦自有感物道情吟咏情性㡬時盡是譏刺他人只緣序者立例篇篇要作美刺説将詩人意思盡穿鑿壊了且如今人見人纔做事便作一詩歌美之或譏刺之是甚麽道理如此一似里巷無知之人胡亂稱頌諛説把持放鵰何以見先王之澤何以為情性之正詩中數處皆應荅之詩如天保乃與鹿鳴為唱荅行葦與既醉為唱荅蟋蟀與山有樞為唱荅唐自是晉未改號晉時國名自作序者以為刺僖公便牽合謂此晉也而謂之唐乃有堯之遺風本意豈因此而謂之唐是皆鑿説但唐風自是尚有勤儉之意作詩者是一箇不敢放懐㡳人説今我不樂日月其除便又説無已太康職思其居到山有樞是荅便謂子有衣裳弗曵弗婁宛其死矣他人是愉子有鍾鼓弗鼓弗考宛其死矣他人是保這是荅他不能享些快活徒恁地苦澁詩序亦有一二有慿據如清人碩人載馳諸詩是也昊天有成命中説成王不敢康成王只是成王何須牽合作成王業之王自序者恁地附㑹便謂周公作此以告成功他既作周公告成功便将成王字穿鑿説了又㡬曽是郊祀天地被序者如此説後来遂生一場事端有南北郊之事此詩自説昊天有成命又不曽説着他如何説道祭天地之詩設使合祭亦須㡬句説及后土如漢諸郊祀詩祭某神便説某事若用以祭地不應只説天不説地東莱詩記却編得子細只是大本已失了更説甚麽向嘗與之論如此清人載馳一二詩可信渠却云安得文字許多證據熹云無證而可疑者只當闕之不可據序作證渠又云只此序便是證熹因云今人不以詩説詩却以序解詩是以委曲牽合必欲如序者之意寧失詩人之本意不恤也此是序者大害處葉賀孫録詩序多是後人妄意推想詩人之美刺非古人之所作也古人之詩雖存而意不可得而知序詩者妄誕其説但擬見其人如彼便以為是詩之美刺者必若人也如衛柏舟之刺衛頃公之棄仁人今觀史記所述竟無一事可記頃公固亦是衛一不美之君序詩者但見其有棄仁用佞之迹便指為刺頃公之詩此類甚多皆是妄生美刺初無其實至有不能攷之者則但言刺時也思賢妃也然此是汎汎而言尚猶可也如漢廣之序言徳廣所及此語最亂道更不攷詩人言漢之廣矣其言已自分曉至如下面小序却説得是謂文王之化被于南國美化行乎江漢之域無思犯禮求而不可得也此語最好又云㸔来詩序當時只是箇山東學究等人做不是老師宿儒之言故所言都無一是當處如行葦之序皆是詩人之言而不知詩人之意周家忠厚仁及草木故能内睦九族外尊事黄耇養老乞言以成其福禄焉他見詩中言敦彼行葦牛羊勿踐履則謂之仁及草木見戚戚兄弟莫逺具爾則謂之故能内睦九族見有以祈黄耇之語便謂之養老乞言不知而今做人到這處将如何做於理決不順熹謂此詩本是四章章八句他不知作八章章四句讀了如敦彼行葦牛羊勿踐履方苞方體惟葉泥泥戚戚兄弟莫逺具爾或肆之筵或授之几此詩本是興説上面四句即是興起下四句言以行葦興兄弟勿踐履興莫逺意也又云鄭衞詩多是淫奔之詩鄭詩如将仲子以下皆鄙俚之言只是一時男女淫奔相褻之語如桑中之詩序云衆散民流而不可止故樂記云桑閒濮上之音亡國之音也其衆散其民流誣上行私而不可止也鄭詩自緇衣之外亦皆鄙俚如采蕭采艾青衿之類是也故夫子云放鄭聲也又如抑之詩非詩人作以刺君乃武公自為之以自警戒也故其為詩辭意俱美如云相在爾室尚不愧于屋漏神之格思不可度思之語皆善言也又有稱小子之言此必非臣下告君之語乃自謂之言無疑也或問賔之初筵之詩是自作否曰有時亦是因飲酒之後作此自戒也未可知黄有開記熹㸔詩要人只将詩正文讀自見其意今人都縁這序少間只要説得序通却将詩意来合序説却不要説教詩通人多是如此㸔吕子約得一番説道近㸔詩有所得待取来㸔都只是説得序通熹意間非獨将序下文字去了首句甚麽也亦去了熹㸔来大段有不是處且如漢廣詩下面㡬句猶似説得通上一句説德廣所及也是説甚麽又如説賔之初筵衛武公自悔之詩㸔来只是武公自悔國語説武公年九十猶箴警于國曰羣臣無以我老耄而舍我必朝夕端恪以交戒我看這意思只是悔過之詩如抑之詩序謂衞武公刺厲王亦以自警也後来又攷見武公時厲王已死又為之説是追刺凡詩説美意是要那人知如何追刺以意度之只是自警他只縁要篇篇有美刺故如此説又説道亦以自警兼是説正雅變雅看變雅中亦自煞有好詩不消分變雅亦得如楚茨信南山甫田大田諸篇不待㸔序自見得是祭祀及稼穡田政分明到序説出来便道是傷今思古陳古刺今這那裏見得且如卷阿是説召康公戒成王如何便到後面民勞板蕩刺厲中間一截是㡬時却無一事係美刺只緣他須要有美有刺美便是成康時君刺只是幽厲所以其説皆有可疑問曰怕是聖人刪定故中間一截無存者曰怕不㑹刪去得許多如太史公説古詩三千篇孔子刪定三百怕不㑹刪得如此多只是不消㸔序看正文自見得葉賀孫錄向者吕子約書来説近来㸔詩甚有味錄得一冊来盡是寫他讀詩有得處及觀之盡是説詩序如關雎只是説一箇后妃之徳也葛覃只是説得箇后妃之本與化天下以婦道也自闗闗雎鳩葛之覃兮已下更不説著如此讀詩是讀箇甚麽吕伯恭大事記亦是如此盡是如此編排詩序書序在上面他門讀書盡是如此草草以言事則不實以立辭則害意沈僴錄人言何休為公羊忠臣熹嘗戲伯恭為毛鄭之佞臣楊道夫錄小序麟趾詩雖衰世之公子皆信厚如麟趾之時也此句似無義理江有汜詩是媵自作非美媵也此二處下皆未曽注未知如何荅曰當補荅潘時舉陳埴問江有汜詩序有勤而無怨之説曰便是序不可信如此詩序自是兩三人作今但信詩不必信序只㸔詩中説不我以不我過不我與便自見得不與同去之意安得勤而無怨之意因問埴此是召南詩如何公方㸔周南便有説召南讀書且要逐處沉潜次第理㑹不要班班剥剥指東摘西都不濟事若能沉潜専一㸔得文字只此便是治心養性之法錢木之錄問􅆁柏舟如何觧曰只得觧作仁人不遇但疑不是為頃公作又問棫樸何以見文王之能官人曰小序不可信類如此此篇與前後數篇同為稱揚之辭作序者為見棫樸近箇人材㡳意思故云能官人也行葦序尤可笑第一章只是起興何與仁及草木以祈黄耇是頌願之辭如今人舉酒稱夀㡳言語只見有祈字便説是乞言吴必大錄潘時舉問甫田詩志大心勞曰小序説志大心勞已是説他不好人若能循序而進求之以道則志不為徒大心亦何勞之有人之所期固不可不逺大然下手做時也須一步歛一步着實做始得若徒然心務髙逺而不下着實之㓛亦何益哉董銖錄經書都被人説壊了前後相仍不覺且如狡童詩是序之妄安得當時人民敢指其君為狡童況忽之所為可謂之愚豈得為狡當是男女相怨之詩邵浩别錄江疇問狡童刺忽也其言疾之太重先生云若以當時之暴歛於民觀之為言亦不為甚盖民之於君聚則為君臣散則為仇讐如孟子所謂君之視臣如草芥則臣視君如冦讐是也然詩人之意本不如此何曽言狡童是刺忽而序詩者妄意言之致得人如此説聖人言鄭聲淫者盖鄭人之詩多是言當時風俗男女淫奔故有此等語狡童想譏當時之人非刺其君也黄有開記時舉問東山詩序前後都是只中間插大夫羙之一句便只不是周公作矣曰小序非出於一手是後人旋旋添續往往失了前人本意如此類者多矣潘時舉錄棫樸序只下能官人三字便晦了一篇之意楚茨等十来篇皆是好説如何見得是傷今思古只被亂在變雅中便被後人如此想象如東坡説某處猪肉衆客稱美之意吴必大錄抑非刺厲王只是自警嘗攷衞武公生於宣王末年安得有刺厲王之詩據國語亦是自警詩中詞氣若作自警甚有理若作刺厲王全然不順吕伯恭却謂國語非是邵浩别錄先生説抑詩煞好鄭可學謂東莱硬要做刺厲王緣以爾汝字礙曰如幕中之辨人反以汝為叛臺中之評人反以汝為傾等類亦是自謂古人此様多大抵他説詩其原生於不敢異先儒将詩去就那序前面被這些子硬便轉来又穿鑿胡説更不向前求前面廣大處去或有兩三説則俱要存之如一句或為興或為比或為賦則曰詩兼備此體熹謂既取興體則更不應又取比體既取比體則更不應又取賦説狡童便引石虎為證且要有字不曵白南軒不觧詩不用觧諸先生説好了南軒却易曉説與他便轉陳淳錄抑之小序曰衛武公刺厲王亦以自警也一詩不應既刺人又自警之理况厲王無道被人言提其耳以小子呼之必不素休且厲王監謗暴虐無所不至無限大過此詩都不問著却只於威儀上點檢此必不然以史攷之武公即位在厲王既沒之後是宣王之時注家以為追刺不知追刺他何益伯恭主張小序謂史記為不足信武公必是曽事厲王嘗攷國語武公九十五嵗作懿之詩其中有匪我言耄之辭正此詩也又如曰謹爾侯度曰喪厥國皆是諸侯事削去謂刺厲王者只以為武公自警其意味便甚長所謂嗚呼小子告爾舊止盖箴規之文體當如此使人日夕諷誦以警已耳後漢侯芭亦嘗有此説吴必大錄問詩章起於誰曰有故言者是指毛公無故言者皆是鄭康成有全章換一韻處有全押韻處如頌中有全篇句句是韻如殷武之類無兩句不是韻到稼穡匪觧自欠了一句前輩分章都曉不得熹細讀方知是欠一句葉賀孫錄因㬊淵問詩三百處因推説及由庚白華等乃是笙詩有其譜而無其辭者也潘時舉錄因學者問大學敖惰處而曰熹嘗謂如有人問易不當為卜筮書詩不當去小序不當叶韻及大學敖惰處皆在所不荅沈僴錄詩傳遺説卷二
