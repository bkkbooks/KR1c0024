body:
  text: 詩傳遺説卷三宋朱鑑編六義思無邪問答附讀詩須得他六義之體如風雅頌則是詩人之格後人説詩以為雜雅頌者縁釋七月之詩者以為備風雅頌三體所以唘後人之説如此興之為言起也言興物而起如青青陵上柏青青河畔草皆是興物詩也如藁砧今何在何當大刀頭皆是比物詩也黄有開記問詩傳説六義以託物興辭為興與舊説不同曰覺舊説費力失本指如興體不一或借眼前物事説将起或别自将一物説起大抵只是将三四句引起如唐時尚有此等詩體如青青河畔草青青水中蒲皆是别借此物興起其辭非必有感有見於此物也有将物之無興起自家之所有将物之有興起自家之所無前輩都理㑹這箇不分明如何説得詩本指只伊川先生也自未見得看所説有甚廣大處子細看本指却不如此若上蔡先生怕曉得詩如云讀詩須先要識得六義體面這是他識得要領處問詩雖是吟咏使人自有興起固不専在文辭然亦須是篇篇句句理㑹着實見得古人所以作此詩之意方始於吟咏上有得曰固是若不得其真實吟詠箇甚麽然古人已多不曉其意如左傳所載歌詩多是本意元不相闗葉賀孫錄詩之興全是借他物舉起全不取義後人之詩猶有此體如青青陵上柏磊磊澗中石人生天地間忽如逺行客又有髙山有崖林木有枝憂来無端人莫之知皆是此體楊至錄或問大序六義注中有三經三緯之説先生曰三經是賦比興是做詩㡳骨子無詩不有纔無則不成詩盖不是賦便是比不是比便是興如風雅頌却是裏面横串㡳都有賦比興故謂之三緯吕徳昭錄聖賢代作未有孔子便無論語之書未有孟子便無孟子之書未有堯舜便無典謨未有商周便無風雅頌葉賀孫錄先生問時舉看文字如何對曰詩傳今日方看得綱領緊要識得六義頭面分明分明則詩亦無難㸔者曰讀詩全在諷詠得熟則六義将自分明須使篇篇有箇下落始得潘時舉錄陳埴問詩傳分别六義有未備處曰不必又只管滯泥許多且㸔詩意義如何古人一篇詩必有一篇意思且要理㑹得這箇因説如柏舟之詩只説到静言思之不能奮飛綠衣之詩説我思古人實獲我心此可謂止乎禮義所謂可以怨便是喜怒哀樂𤼵而皆中節處推此以觀則子之不得於父臣之不得於君朋友之不相信皆當以此意處之如屈原之懐沙赴水賈誼言厯九州而相其君兮何必懐此都也便都過當了古人胷中𤼵出意思自好看着三百篇詩則後世之詩多不足觀矣錢木之錄問詩中説興處多近比曰然如闗雎麟趾相似皆是興而兼比然雖近比其體却只是興且如闗闗雎鳩本是興起到得下面説窈窕淑女此方是入題説那實事盖興是以一箇物事貼一箇物事説上文興而起下文便接説實事如麟之趾下文便接振振公子一箇對一箇説盖公本是箇好㡳人子也好孫也好族人也好譬如麟趾也好定也好角也好及比則却不入題了如比那一物説便是説實事如螽斯羽詵詵兮宜爾子孫振振兮螽斯羽一句便是説那人了下面宜爾子孫依舊是就螽斯羽上説更不用説實事此所以謂之比大率詩中比興皆類此沈僴錄詩比興比是以一物比一物而所指之事常在言外興是借彼一物以引起此事而其事常在下句但比意雖切而却淺興起雖闊而味長葉賀孫錄所諭詩説先儒本謂周公制作時所定者為正風雅其後以類附見者為變風雅耳固不謂變者皆非美詩也大序之文亦有可疑處而小雅篇次尤多不可曉者此未易攷但聖人之意使人法其善戒其惡此則炳如日星耳今亦不須問其篇章次序事實是非之如何但玩味得聖人垂示勸戒之意則詩之用在我矣鄭衛之詩篇篇如此乃見其風俗之甚不美若止載一兩篇則人以為是適然耳大抵聖人之心寛大平夷與今人小小見識遮前掩後㡳意思不同此語亦卒乍與人説不得且徐思之俟他日面講也荅廖徳明書又問讀先生詩傳極有感𤼵始知詩真可以興也所疑正變風雅已荷開曉夫温柔端厚寛大平夷固詩之教求之緑衣終風柏舟考槃尤曉然可見但所謂小小見識遮前掩後者不知所主何意於詩何與豈只以所載刺詩有淫褻不可告語者聖人亦存而不刪也邪答曰鄙意初亦正謂如此但寛大平夷亦舉大體而言不専指此一類也同上詩有是當時朝廷作者雅頌是也若國風乃採詩者採之民間以見四方民情之美惡二南亦是採民言而被樂章爾程先生必要説是周公作以教人不知是如何熹不敢從若變風又多是淫亂之詩故班固言男女相與歌詠以言其情是也聖人存此亦以見上失其教則民欲動情勝其弊至此故曰詩可以觀也且詩有六義先儒更不曽説得明却又因周禮説豳詩有豳雅豳頌即於一詩之中要見六義思之皆不然盖所謂六義者風雅頌乃是樂章之腔調也如言仲吕調大石調越調之類是也至比興賦則又如直指其名直叙其事者賦也如本要言其事而虛用兩句釣起因而接續去者興也引物為況者比也立此六義非特使人知其聲音之所當又欲使歌者知作詩之法度也問豳之所以為雅為頌者恐是可以用雅㡳腔調又可用頌底腔調否曰恐是如此熹亦不敢如此斷今只説恐是亡其二余大雅錄古者風雅頌名既不同其聲想亦各别大率國風是民庶所作雅是朝廷之詩頌是宗廟之詩楊與立編語略陳君舉得書云更望以雅頌之音簫勺羣慝問他看如何是雅頌之音今只有雅頌之辭在更沒理㑹又去那裏討雅頌之音葉賀孫録陳埴問風雅與無天子之風之義先生舉鄭漁仲之説言出於朝廷者為雅出於民俗者為風文武之時周召之民作者謂之周召之風東遷之後王畿之民作者謂之王風似乎大約是如此亦不可為斷然之説但古人作詩體自不同雅自是雅之體風自是風之體如今人做詩曲亦自有體製不同者自不可亂不必説雅之降為風今且就詩上理㑹意義其不可曉處不必反倒錢木之錄林夔孫問詩者中聲之所止如何曰只是正風雅頌是中聲那變風不是伯恭堅要牽合説是然恐無此理今但去讀便自有那輕薄㡳意思在了自是不同如韓愈説數句其聲浮以淫之類正是如此黄義剛錄比雖是較切然興却意較深逺也有興而不甚深逺者比而深逺者這又随人之髙下有做得好㡳有拙㡳嘗看後世如曹丕之徒作詩皆只是説風景獨曹操愛説周公可見其志趣乖異同上大師掌六詩以教國子曰風曰賦曰比曰興曰雅曰頌而詩大序謂之六義盖古今聲詩條理無出此者風則閭巷風土男女情思之詞雅則朝㑹燕享公卿大夫之作頌則鬼神宗廟祭祀歌舞之樂其所以分者皆以其篇章節奏之異而别之也賦則直陳其事比則取物為比興則託物興詞其所以分者又以其属辭命義之不同而别之也誦詩者先辨乎此則三百篇者若網在綱有條而不紊矣不特詩也楚人之詞亦以是而求之則其寓情草木託意男女以極遊觀之適者變風之流也其叙事陳情感今懐古以不忘乎君臣之義者變雅之類也至於語闕昏而越禮攄怨憤而失中則又風雅之再變矣其語祀神歌舞之盛則㡬乎頌而其變也又有甚焉其為賦則如騷經首章之云也比則香草惡物之類也興則託興興詞初不取義如九歌沅芷澧蘭以興思公子而未敢言之属也然詩之興多而比賦少騷則興少而比賦多要必辨此而後詞義可尋讀者不可以不察也楚辭集注楚俗祠祭之歌今不可得而聞矣然計其間或以隂巫下陽神或以陽主接隂鬼則其辭之褻慢淫荒當有不可道者故屈原因而文之以寄吾區區忠君愛國之意比其類則宜為三頌之属而論其辭則反為國風再變之鄭衛矣及徐而深味其意則雖不得於君而艾慕無已之心於此為尤切是以君子猶有取焉盖以君臣之義而言則其全篇皆以事神為比不雜他意以事神之意而言則其篇内又或自為賦為比為興而各有當也楚辭辨證越人歌者楚鄂君汎舟於新波之中榜枻越人擁棹而歌此詞其義鄙褻不足言特以其自越而楚不學而得其餘韻耳於周大師六義之所謂興者亦有契焉知聲詩之體古今共貫胡越一家有非人之所能為者是以不得以其逺且賤而遺之也思無邪如正風雅頌等詩可以起人善心如變風等詩極有不好者可以使人知戒懼不敢做大段好詩是大夫作那一等不好詩只是閭巷小人作前輩多説是作詩者之思不是如此其間多有淫奔不好㡳詩不成也是無邪思上蔡舉數詩只説得箇可以怨一句意思狹甚若要盡得可以興以下數句須是思無邪一語包得甚闊吕伯恭做讀詩記首載謝氏一段説話這一部詩便被此壊盡意思夫善者可以感𤼵得人之善心惡者可以懲創得人之逸志今使人讀好㡳詩固是知勸若讀不好㡳詩便悚然戒懼知得此心本不欲如此其所以如此者是此心之失所以讀詩者使人心無邪也此是詩之功用如此周眀作錄問詩三百一言以蔽之曰思無邪不知如何蔽之以思無邪曰前輩多就詩人上説思無邪𤼵乎情止乎禮義熹疑不然不知教詩人如何得思無邪謂如文王之詩稱頌盛徳盛美處皆吾所當法如言邪僻失道之人皆吾所當戒是使讀詩者求無邪思分而言之三百篇各是一箇思無邪合三百篇而言緫是一箇思無邪問聖人言經中皆可為法皆可為戒何獨詩也曰固是如此然詩中因情而起則有思欲其思出於正獨指思無邪以示教焉徐㝢錄問詩説思無邪與曲禮説毋不敬意同否曰毋不敬正是用㓛處所謂正心誠意也思無邪思至此自然無邪㓛深力到處所謂心正意誠若學者當求無邪思而於正心誠意處着力然不先致知則正心誠意之功何施所謂敬者何處頓放今人守得一箇敬字全不去擇義所以應事接物皆顛倒了同上楊士訓問思無邪毋不敬曰禮言毋不敬是正心誠意之事詩言思無邪是心正意誠之事盖毋者禁止之辭若自毋不敬則亦心正意誠之事矣又曰孔子曰博學於文約之以禮顔子曰博我以文約我以禮孟子曰博學而詳説之将以反説約也今若祇守着兩句如何做得須是讀了三百篇有所興起感𤼵然後可以謂之思無邪真箇坐如尸立如齊而後可以言毋不敬楊道夫看詩大體要得無邪盖三百篇中善可為法惡可為戒耳不是言作詩者皆無邪思也吴必大錄或曰先儒以三百篇之義皆思無邪曰如伯恭之説亦是如此讀詩記序説一大段主張箇詩説三百篇之詩都如此看来只是説得箇可以怨言詩人之情寛緩不迫優柔温厚而已只用他這一説便瞎却一部詩眼沈僴錄詩三百一言以蔽之曰思無邪若是常人言只道一箇思無邪便了便略了那詩三百聖人須要從詩三百逐一篇理㑹了然後理㑹得思無邪此所謂下學而上逹也葉賀孫錄問詩三百程子曰思無邪誠是也其言簡矣未審其意謂作詩者以誠而作耶抑謂讀詩者當誠其意以讀之耶案程子之説特以訓思無邪之義云爾以詩攷之雅頌二南之外辭蕩而情肆者多矣則誠之為言固不可槩以為作詩者之事也若謂使學者先誠其意而後讀之則是詩之善惡方賴我以決擇而我之於詩反若無所資焉者又何取於詩之教耶以此觀程子之言雖簡然誠之一字施之必得其當可也是則集注之云固所以𤼵眀程子之意而言之矣唘曰行之無邪必其心之實也思而無邪則無不實矣此程子之意也答吴必大李閎祖問思無邪伊川説作誠是否曰誠是在思上𤼵出詩人之思皆性情也性情本出於正豈有假偽得来㡳思便是性情無邪便是正以此觀之詩三百篇皆欲人出於情性之正黄有開記詩上説思無邪自家口讀思無邪心裏却胡思亂想這不是讀書葉賀孫錄詩之言有善惡而讀者足以為勸戒非謂詩人為勸戒而作也但其言或顯或晦或偏或全不若此句之直截而該括無遺耳同上詩三百一言以蔽之曰思無邪人多言作詩者思皆出於無邪此非也如頌之類固無邪若變風變雅亦有淫邪處但只是思無邪一句足以當三百篇之義詩中格言固多緊要惟此一句孔子刪詩所以兼存盖欲見當時風俗厚薄聖人亦以此教後人周謨錄徐㝢問思無邪曰三百篇詩只是要得人思無邪思無邪三字代得三百篇之意葉賀孫録問思無邪曰不但是行要無邪思也要無邪誠者合内外之道便是表裏如一内實如此外也實如此故程子曰思無邪誠也潘如舉錄詩之所言皆思無邪也如闗雎便是説樂而不淫哀而不傷葛覃便是説節儉等事皆歸於思無邪也然此特是就其一事而言未足以括盡一詩之意惟思無邪一語足以盖盡三百篇之義盖如以一物盖盡衆物之意黄義剛録先生説思無邪集註云有因一事而言者如闗雎言樂而不淫哀而不傷葛覃言孝敬勤儉卷耳言正静純一皆是就一事上見思無邪夫子取出這一句来斷三百篇詩唯此一句可以盡盖三百篇之義程子説思無邪誠也諸公皆不曽子細㸔且如人或言之無邪未見他誠在行之無邪亦未見得他誠在唯出於心之所思者無邪方始見得他真箇是誠吕徳眀錄問思無邪子細思之只是要讀詩者思無邪曰舊人説似不通中間如許多淫亂之風如何要思無邪得如止乎禮義中間許多不正詩也如何得㑹止乎禮義只怕他當時大約説許多中格詩却不指許多淫亂㡳説熹㸔来詩三百篇其説好㡳也要教人思無邪説不好㡳也要教人思無邪只是其他便就一事上各見其意然事事有此意但只是思無邪一句方盡得許多意問直指全體是如何曰只是説思無邪一語直截見得詩教之本意是全備得許多零碎㡳意又曰聖人言詩之教只要得人思無邪其他篇篇是這意思惟是此一句包説得盡葉賀孫錄只此一言盡當得三百篇之義讀詩者只要得思無邪耳㸔得透每篇各是一箇思無邪總三百篇亦是一箇思無邪毋不敬禮之所以為教思無邪詩之所以為教徐㝢錄問所謂其言微婉各因一事而𤼵曰一事如淫奔之詩只刺淫奔之事如暴虐之詩只刺暴虐之事思無邪却凡事無不包也又曰陳少南要廢魯頌忒煞輕率他作序却引思無邪之説若廢了魯頌却沒這一句同上問思無邪誠也非獨是行無邪直是思無邪方是誠曰公且未要説到這裏且就詩三百如何一言以蔽之曰思無邪集注説要使人得情性之正情性是貼思正是貼無邪此如做時文相似只恁地貼方分曉若好善惡惡皆出於正便㑹無邪若果是正自無虛偽自無邪若有時也自入不得葉賀孫錄或問思無邪如何是直指全體曰詩三百篇皆無邪思然但逐事無邪耳唯此一言舉全體言之因曰夏之日冬之夜百嵗之後歸於其居冬之夜夏之日百嵗之後歸於其室此亦無邪思也出其東門有女如雲雖則如雲匪我思存縞衣綦巾聊樂我貟此亦無邪思也為子而賦凱風亦無邪思也為臣而賦北門亦無邪思也但不曽識破耳唯思無邪一句便分眀説破或曰淫奔之詩固邪矣然反之則非邪也故熹説其善者可以感𤼵人之善心惡者可以懲創人之逸志輔廣錢本之錄同徐㝢問思無邪曰非言作詩之人思無邪也盖謂三百之詩所美者皆可以為法而所刺者皆可以為戒讀之者思無邪耳作之者非一人安能思無邪乎只是要正人心統而言之三百篇只是一箇思無邪析而言之則一篇之中自有一箇思無邪楊道夫錄又曰不必説是詩人思及讀詩之思大凡人思皆當無邪此一句出處止是説馬孔子見得此一句皆盖三百篇之義故舉以為説或曰此與毋不敬之義同否曰毋不敬非特説禮者及㸔禮者當如此大凡人皆當毋不敬正如今之人皆當思無邪也竇從周録問思無邪集注以為凡言善者足以感𤼵人之善心言惡者足以懲創人之逸志而諸家乃専主作詩者而言何也曰詩有善有惡頭面最多而惟思無邪一句足以該之上至於聖人下至於淫奔之事聖人皆存之者所以欲使讀者知所懲勸其言思無邪者以其有邪也黄榦曰詩之善惡如藥之參苓巴豆而思無邪乃藥之單方足以當是藥之善惡者也曰然道夫曰如此則施之六經可也何必詩曰他經不必言又曰詩恰如春秋春秋皆亂世之事如聖人一切財之以天理楊道夫録問夫子言三百篇詩可以興善懲惡其用皆要使人思無邪而已夫子言此欲使學詩者於此求之先生久之方云不曽見得縫罅處只是渾淪説了令又再説對曰三百篇詩皆出情性之正故善者可以興起人之善心惡者可以懲創人之逸志其用皆要使人思無邪謂夫人取此三百篇欲使學詩者皆得其情性之正故曰思無邪曰便是看得集注意不出熹不曽説是詩人皆出於情性之正若是詩人皆出於情性之正熹須説了此只有一句集注中却反覆説兩三段須用曉得意昨夜公説是詩人皆情性之正熹便知公理㑹不得對曰緣未曉得三百篇之㫖所以看得不分眀願先生指教曰便是三百篇詩不皆出情性之正如闗雎二南詩是出於情性之正四牡鹿鳴詩是出於情性之正文王大明詩是出於情性之正桑中鶉之奔奔等詩豈是出於情性之正鄭南升錄又問思無邪先生曰人言夫子刪詩㸔来只是採得許多詩夫子不曽刪去往往只是刋定而已聖人當来刋定好㡳詩便要吟咏興𤼵人之善心不好㡳詩便要興起人羞惡之心皆是要人思無邪盖思無邪是魯頌中一語聖人却言三百篇詩惟此一言足以盡之潘時舉録程子言聖賢千萬語只是要人将已放之心反覆入身来并言孟子學問之道無他求其放心而已謂如學禮也只是求放心學樂也只是求放心讀書讀詩致知力行皆只是求放心也與詩三百一言以蔽之之義同詩只是要思無邪吴必大錄詩傳遺説卷三
