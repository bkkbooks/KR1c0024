body:
  text: 詩傳遺説卷六宋朱鑑編頌或疑清廟詩是祀文王之樂歌然初不顯頌文王之德止言助祭諸侯既敬且和與夫與祭執事之人能執行文王之德者何也時舉應之曰文王之德不可名言凡一時在位之人所以能敬且和與執行文王之德者即文王盛德之所在也必於其不可容言之中而見其不可掩之實則詩人之意得矣讀此詩者想當時聞其歌者真若洋洋乎如在其上如在其左右又何待多著言語委曲形容而後足云哉妄意如此答曰此説是答潘時舉書對越在天便是顯處駿奔走在廟便是承處吕德明録中庸詩云維天之命於穆不已蓋曰天之所以為天也於乎不顯文王之德之純蓋曰文王之所以為文也純亦不已於歎辭穆深逺也不顯猶言豈不顯也純純一不雜也程子曰天道不已文王純於天道亦不已純則無二無雜不已則無間斷先後章句維天之命於穆不己不其忠乎此是不待盡而忠也乾道變化各正性命不其恕乎此是不待推而恕也輔廣録陳淳問康王如何無詩曰熹竊以為昊天有成命之類便是康王詩而今人只是要解那成王做成王業後便不可曉且如左傳分明説作成王詩後韋昭又且費盡氣力要解從那王業上去不知怎生地黃義剛録問我將詩云惟天其右之既右享之今所解都作左右之右與舊不同曰周禮有享右祭祀之文如詩中此例亦多如既右烈考亦右文母之類如我將所云作保祐説更難方説維羊維牛如何便説保祐到伊嘏文王既右享之也説不得右助之右問振鷺詩不是正祭之樂歌乃獻助祭之臣未審何如曰看此文意都無告神之語恐是獻助祭之臣古者祭祀每一受胙主與賔尸皆有獻酬之禮既畢然後亞獻畢復受胙如此禮意甚好有接續意思到唐時尚然今併受胙於諸獻既畢之後主與賔尸意思皆隔了古者一祭之中所以多事如季氏祭逮暗而祭日不足繼之以燭雖有強力之容肅敬之心皆倦怠矣有司跛倚以臨祭其為不敬大矣他日祭子路與室事交乎戶堂事交乎階質明而始行事晏朝而退孔子聞之曰誰謂由也而不知禮乎古人祭祀是大段有節奏葉賀孫録問我將之詩乃祀文王於明堂之樂章詩傳以謂物成形於帝人成形於父故季秋祀帝於明堂而以父配之取其成物之時也此乃周公以義起之非古禮也不知周公以後將以文王配耶以時王之父配耶曰諸儒正持此二議至今不決看來只得以文王配且周公所制之禮不知在武王之時在成王之時若在成王則文王乃其祖也亦自可見又問繼周者何如曰只得以有功之祖配之沈僴録論語三家者以雍徹子曰相維辟公天子穆穆奚取於三家之堂徹祭畢而收其爼也天子宗廟之祭則歌雍以徹是時三家僭而用之相助也辟公諸侯也穆穆深逺之意天子之容也此雍詩之詞孔子引之言三家之堂非有此事亦何取於此義而歌之乎譏其無知妄作以取僭竊之罪集注天子宗廟之祭歌雍詩以徹其爼今三家亦歌此以祭聖人但舉雍詩之辭以譏之曰汝之祭亦有諸侯之助乎亦有天子穆穆深逺之容乎既無此事奚用此義此見三家全懵然不曉義理而妄為僭竊之事鄭南外録周頌陟降庭止傳注訓庭為直而説之云文王之進退其臣皆由直道諸儒祖之無敢違者而顔監於康衡傳所引獨釋之曰言若有神明臨其朝廷也蓋康衡時未行毛説顔監又精史學而不梏於専經之陋故其言獨能如此無所阿隨而得經之夲指也余舊讀詩而愛顔説然尚疑其無據及讀楚辭乃有登降堂只之文於是益信陟降庭止之為古語其義審如顔説而無疑也顔注漢書時有發明於經指多若此類如訓棐為匪尤為明切足證孔安國張平子之謬其視韋昭之徒専守毛鄭而不能一出已見者相去逺矣楚辭辨證問泰伯知大王有取天下之志而王季又有聖子故遜去曰泰伯惟是不要大王有天下或問大王有翦商之志果如此否曰詩裏分明説實始翦商又問恐詩是推本得天下之由如此曰若推本説不應下實始翦商看左氏云泰伯不從是以不嗣這甚分明這事也難説也無所據只是將孔子稱泰伯可謂至德也已矣是與稱文王一般葉賀孫録侯國三軍亦只是三郊之衆大國三郊次國二郊小國一郊蔡季通説車一乘下止甲士三人步卒七十二人此是輕車用馬馳者更有二十三人將重車在後用牛載糗糧戈甲衣裝見七書如魯頌公徒三萬已具其説黃義剛録問戎狄是膺荆舒是懲僖公安有此事而魯頌言之何也曰此是願頌之辭曰孟子以為周公之事何也曰此是孟子讀詩不子細又問或謂魯頌非三百篇之數夫子姑附於此耳曰思無邪一言正出魯頌吳必大録孟子魯頌曰戎狄是膺荆舒是懲周公方且膺之膺擊也荆楚本號也舒國名近楚者也懲艾也案今此詩為僖公之頌而孟子以周公言之亦斷章取義也集注商頌簡奧李閎祖録問商頌或以為宋人所作如何曰宋襄公一伐楚其事可考安得所謂莫敢不來享莫敢不來王者曰恐是宋人作之追述往事以祀其先代若是商時所作商尚質不應篇章反多於周頌曰周頌雖簡然文氣平易商頌雖長其文氣自古吳必大録問那綏我思成集傳鄭氏所引禮記之説程子則曰此特孝子平日思親之心耳若齊則不容有思有思非齊也必大竊謂人心不容無思齊之日特齊其不齊者爾若思其居處之類乃其致誠意以交乎神者蓋未害其為齊也未知是否答曰鄭氏所引者常法也程子之義則益精矣答吳必大湯孫奏假綏我思成當只作祖考説劉砥録湯降不遲降生也如維嶽降神之降降於卿士却作降汜説同上湯降不遲聖敬日躋謂天之生湯恰好當合生時節湯之修德又無一日間斷吳必大録陳淳問玄鳥詩吞卵事亦有此否曰當時恁地説必是有此今不可以聞見不及定其為必無黃義剛録景貟維河一句上下文皆可曉却不知此句説甚麼又如三夀作朋三夀不知是如何歐陽公亦嘗用三夀字想此等語皆是當時有此説話人都曉得至於今不可曉同上詩所謂四方之極於皇極之義為尤切皇極辨逸詩論語唐棣之華偏其反而豈不爾思室是逺而唐棣郁李也偏晉書作翩然則反亦當與翻同言華之搖動也而語助也此逸詩也於六義屬興上兩句無意義但以起下兩句之辭耳其所謂爾亦不知其何所指也集注問唐棣之華偏其反而曰此自是一篇詩與今常棣之詩别常音裳爾雅棣栘似白楊江東呼夫栘常棣棣子如櫻桃可食自是兩般物此逸詩不知當時人思箇甚底東坡謂思賢而不得之詩看來未必是思賢但夫子大槩止是取下面兩句云人但不思思則何逺之有初不與上面説權處是一段唐棣之華而下自是一假緣漢儒合上文為一章故誤認偏其反而為反經合道所以錯了晉書有一處引偏字作翩反作平聲言其華有翩反飛動之意今無此詩不可考據故不可立為定説竇從周録子夏問曰巧笑倩兮美目盼兮素以為絢兮此是詩人説得不甚分明子夏疑其以質為飾恐倒了故問素質也絢飾也有如是之質然後加之以文飾孔子對以繪事後素子夏悟其意便曰禮後乎此便是楊先生所謂甘受和白受采忠信之人可以學禮之意周謨録素以為絢兮不知是何詩若以為今碩人詩則章句不合且此一句最有理亦不應刪去同上詩樂小雅傳曰大學始教宵雅肄三官其始也宵之言小也肄習也習小雅之三謂鹿鳴四牡皇皇者華也此皆君臣宴樂相勞苦之詩為始學者習之所以勸之以官具取上下相和厚今案鄉飲酒及燕禮皆歌此三篇笙入樂南陔白華華黍間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀六笙詩本無詞聲亦不傳呦清黃呦南鹿㽔鳴姑食南野姑之太蘋黃我㽔有林嘉應賔南鼓林瑟南吹清黃笙林吹㽔笙林鼓南簧姑承應筐清黃是姑將南人林之南好黃我姑示林我南周清太行清黃呦黃呦姑鹿㽔鳴姑食林野南之清太蒿清黃我林有南嘉應賔清黃德南音㽔孔昭林視姑民南不清黃恌姑君應子清黃是姑則㽔是姑效南我林有南旨黃酒姑嘉林賔南式應燕南以清太敖清黃呦黃呦姑鹿太鳴黃食太野黃之㽔芩姑我㽔有南嘉應賔南鼓林瑟南鼓清黃琴林鼓㽔瑟林鼓南琴姑和應樂清黃且姑湛南我林有南旨黃酒姑以林燕南樂黃嘉應賔南之清太心清黃鹿鳴三章章八句黃鍾清宫俗呼正宫四黃牡姑騑㽔騑姑周太道黃倭㽔遲姑豈林不南懷應歸清黃王㽔事姑靡林盬南我林心黃傷應悲清黃四黃牡姑騑林騑南嘽應嘽南駱清太馬清黃豈㽔不林懷應歸南王㽔事姑靡太盬黃不林遑姑啓太處黃翩清黃翩姑者隼南載姑飛應載林下南集㽔于南苞㽔栩林王太事黃靡㽔盬姑不林遑南將清太父清黃翩清黃翩姑者㽔隼姑載林飛應載林止南集林于南苞㽔把姑王㽔事姑靡林盬南不黃遑㽔將太母黃駕黃彼太四黃駱姑載林驟南駸清黃駸林豈林不南懷應歸黃是太用黃作㽔歌姑將應母黃來清太諗清黃四牡五章章五句黃鍾清宫俗呼正宫皇黃皇南者林華南于林彼姑原林隰南侁㽔侁林征㽔夫姑每應懷南靡清太及清黃我黃馬姑維㽔駒姑六清黃轡姑如林濡南載林馳南載黃驅姑周㽔爰姑咨太諏黃我清黃馬林維應騏清黃六林轡南如㽔絲姑載林馳南載㽔驅林周應爰黃咨清太謀清黃我清黃馬林維應駱南六㽔轡姑沃林若南載㽔馳南載㽔驅林周黃爰姑咨太度黃我黃馬南維應駰清黃六清黃轡姑既林均南載林馳南載黃驅姑周應爰南咨清太詢清黃皇皇者華五章章四句黃鍾清宫俗呼正宫魚清黃麗姑于㽔罶姑鱨太鯊黃君㽔子林有應酒南林且南多清黃魚黃麗姑于太罶清黃魴㽔鱧姑君㽔子林有㽔酒姑多㽔且林旨黃魚清黃麗清太于應罶清黃鰋林鯉南君㽔子姑有林酒南林且南有清黃物清黃其姑多應矣南維㽔其姑嘉林矣南物㽔其林㽔矣姑維南其㽔偕姑矣林物黃其太有黃矣姑維應其南時太矣清黃魚麗六章三章章四句三章章二句黃鍾清宫俗呼正宫南清黃有林嘉應魚南蒸應然南罩姑罩南君林子南有㽔酒姑嘉應賔清黃式林燕南以清太樂清黃南凊黃有南嘉㽔魚姑蒸㽔然姑汕林汕南君林子南有黃酒姑嘉黃賔姑式太燕黃以南衎清黃南清黃有清太樛應木南甘清黃瓠林纍林之清黃君黃子太有黃酒姑嘉清太賔清黃式應燕南綏清太之清翩黃翩太者黃隼姑蒸林然南來㽔思姑君清黃子姑有林酒南嘉㽔賔姑式太燕黃又南思清黃南有嘉魚四章章四句黃鍾清宫俗呼正宫南清黃山清太有應臺南北應山南有清太萊凊黃樂應只清黃君應子南邦林家南之清黃基林樂㽔只林君南子姑萬黃夀姑無太期黃南黃山姑有㽔桑姑北黃山姑有太楊黃樂㽔只林君應子南邦林家南之黃光林樂應只清黃君㽔子姑萬林夀南無清太疆清黃南清黃山林有應把南北林山南有清太李清黃樂應只清黃君應子南民南之㽔父姑母林樂㽔只林君㽔子姑德㽔音姑不太已黃南黃山太有黃栲姑北南山㽔有姑杻林樂㽔只林君應子南遐林不南睂清太夀清黃樂應只清黃君㽔子姑德應音南是林茂清黃南清黃山姑有㽔枸姑北應山黃有清太楰清黃樂應只清黃君應子南遐南不㽔黃姑耉林樂㽔只林君㽔子姑保清黃艾南爾林後清黃南山有臺五章章六句黃鍾清宫俗呼正宫周南國風傳曰周南召南正始之道王化之基故用之鄉人焉用之邦國焉鄉飲酒及鄉射禮合樂周南關雎葛覃卷耳召南鵲巢采蘩采蘋燕樂亦云遂歌鄉樂亦即此六篇也鄭氏云合樂謂歌樂與衆聲皆作周南召南國風篇也王后國君夫人房中之樂歌也關雎言后妃之德葛覃言后妃之職卷耳言后妃之志鵲巢言國君夫人之德采蘩言國君夫人不失職采蘋言卿大夫之妻能修其法度夫婦之道生民之本王政之端此六篇者其教之原也故國君與其臣下及四方之賔燕用之合樂也鄉樂者風也小雅為諸侯之樂大雅頌為天子之樂關清黃關南雎林鳩南在黃河姑之太洲黃窈林窕南淑清黃女姑君清黃子林好南逑清黃參清黃差南荇林菜南左林右南流無之清黃窈仲窕林淑無女姑寤太寐姑求太之黃求之南不林得南寤姑寐仲思南服林悠姑哉仲悠姑哉太輾清黃轉南反無側清黃參清黃差無荇南菜林左清太右林采南之清黃窈姑窕仲淑林女南琴林瑟姑友太之姑參太差黃荇姑菜林左林右姑芼林之南窈清黃窕南淑林女清太鍾黃鼓南樂無之清黃關雎三章一章四句二章章八句無射清商俗呼越調葛黃之太覃姑兮太施太于姑中太谷黃維仲葉南萋無萋太黃南鳥無于南飛林集仲于林灌無木太其清黃鳴南喈無喈清黃葛凊黃之清太覃林兮清黃施林于南中無谷清黃維林葉南莫南莫南是黃刈姑是太濩姑為林絺姑為太綌姑服太之姑無太斁黃言清黃告姑師南氏林言林告姑言太歸黃薄黃汙姑我太私姑薄姑浣仲我林衣南害南浣林害無否太歸凊黃寧南父林母黃葛覃三章章六句無射清商俗呼越調采清黃采姑卷林耳南不林盈姑頃林筐南嗟仲我林懷無人太置黃彼姑周太行黃陟清黃彼無崔南嵬林我林馬姑虺南隤林我仲姑林酌南彼無金姑罍太維清太以林不南永無懷清黃陟黃彼姑髙南岡林我馬林玄姑黃南我林姑姑酌太彼姑兕黃觥姑維凊黃以林不南永無傷清黃陟清黃彼南砠清黃矣林我黃馬太瘏黃矣黃我仲僕姑痡林矣南云清黃何南吁無矣凊黃卷耳四章章四句無射清商俗呼越調維黃鵲姑有仲巢林維清黃鳩無居南之林之仲子林于無歸太百清黃兩林御南之清黃維黃鵲林有南巢林維林鳩姑方太之黃之林子黃于林歸姑百太兩黃將太之黃維凊黃鵲無有南巢林維南鳩林盈南之清黃之凊黃子南于姑歸林百清太兩林成南之清黃鵲巢三章章四句無射清商俗呼越調于清黃以南采林蘩南于林沼姑于太沚姑于黃以姑用太之姑公清黃侯南之無事黃于清黃以林采黃蘩南于太澗黃之太中姑于姑以南用林之南公清黃侯南之清太宫清黃被清黃之清太僮南僮林夙清太夜林在南公清黃被黃之姑祁太祁姑薄林言南還無歸清黃采蘩三章章四句無射清商俗呼越調于黃以南采林蘋南南姑澗林之南濵林于林以姑采仲藻林于黃彼姑行太潦黃于黃以姑盛太之姑維清黃筐南及林筥南于林以姑湘仲之林維林錡南及無釜黃于清黃以南奠黃之姑宗林室姑牖太下黃誰仲其南尸無之林有凊黃齊南季無女黃采蘋三章章四句無射清商俗呼越調右風雅十二詩譜大戴禮云凡雅二十六篇其八篇可歌歌鹿鳴貍首鵲巢采蘩采蘋伐檀白駒騶虞八篇廢不可歌七篇間歌史辟史義史見史童史謗史賔十聲睿挾晉志云漢末杜夔傳舊雅樂四曲一曰鹿鳴二曰騶虞三曰伐檀四曰文王皆古聲辭今案大戴禮頗有闕誤其篇目都數皆不可考至漢末年止存三篇而加文王又不知其何自來也其後改作新辭舊典遂廢至唐開元鄉飲酒禮其所奏樂乃有此十二篇之目而其聲今亦莫得聞矣此譜乃趙彥肅所傳曰即開元遺聲也古聲亡滅已久不知當時工師何所考而為此也竊疑古樂有唱有歎唱者發歌句也和者繼其聲也詩詞之外應更有疊字散聲以歎發其趣故漢晉之間舊曲既失其傳則其詞雖存而世莫能補為此故也若但如此譜直以一聲叶一字則古詩篇篇可歌無復樂崩之歎矣夫豈然哉又其以清聲為調似亦非古法然古聲既不可考則姑存此以見聲歌之倣佛俟知樂者考其得失云以上見儀禮經傳通解學禮樂律中所載十二詩譜乃趙子敬所傳云是唐開元間鄉飲酒所歌也但却以黃鍾清為宫此便不可蓋黃鍾管九寸最長若以黃鍾為宫則餘律皆順若以其他律為宫便有相陵處今且只以黃鍾言之自第九宫後四宫則或為角或為羽或為商或為徴若以為角則是民陵其君矣若以為商則是臣陵其君矣徴為事羽為物皆可類推樂記曰五者皆亂迭相陵謂之慢如此則國之滅亡無日矣故製黃鍾四清聲用之清聲短其律之半是黃鍾清長四寸半也若後四宫用黃鍾為角徴商羽則以四清聲代之不可用黃鍾本律以避陵慢故漢志有云黃鍾不復為他律所役其他律亦皆有清聲若遇相陵則以清聲避之不然則否惟是黃鍾則不復為他律所用然沈存中續筆談説云唯君臣民不可相陵事物則不必避先生一日又説古人亦有時用黃鍾清為宫前説恐未是輔廣録或問大序言一國之事繫一人之本謂之風析衛為邶鄘衛先生曰詩古之樂也亦如今之歌曲音名不同衛有衛音鄘有鄘音邶有邶音故詩有鄘音者繫之鄘有邶音者繫之邶若大雅小雅則如今之商調宫調作歌曲者亦案其腔調而作爾大雅小雅亦古之作樂之體格案大雅體格作大雅案小雅體格作小雅非是做成詩後旋相度其辭目為大雅小雅也大率國風是民庶所作雅是朝廷之詩頌是宗廟之詩周謨録或問詩言志聲依永律和聲之説曰古人作詩只是説他心下所存事説出來人便將他詩求歌其聲之清濁長短各依他作詩之語言却將律來調和其聲今人却又先安排下腔調了然後做言語去合腔了豈不是倒了却是永依聲也古人是以樂去就他詩後世是以詩去就他樂如何解興起得人陳埴録聲發出於口成文而節宣和暢謂之音乃合於音調如今之唱曲合宫調宫之類遊警録古人歌詩須皆有散聲添合方可歌若只四字做句如何可歌楊與立編語略因言今日到詹元善處見其教樂又以管吹習古詩二南七月之屬其歌調却只用太常譜然亦只做得今樂若古樂必不恁地美人聽他在臨安録得譜子大凡壓入音律只以首尾二字章首一字是某調章尾即以某調終之如關雎關字令作無射調結尾亦著作無射聲應之葛覃葛字合作黃鍾調結尾亦著作黃鍾聲應之如七月流火三章皆七字起七字則是清聲某調末亦清聲某調結之如五月斯螽動股二之日鑿氷沖沖五字二字皆是濁聲黃鍾調末以濁聲結之元善理會事都不要理會箇是只信口胡亂説事事喚做曽經理會來如宫商角徴羽固是就喉舌脣齒上分他便道只此便了元不知道喉舌脣齒上亦各自有宫商角徴羽何者蓋自有箇疾徐髙下葉賀孫録詹卿家令樂工以俗樂譜吹風雅篇章初聞吹二南詩尚可聽後吹文王詩則其聲都不成模樣因言古者風雅頌名既不同其聲想亦各别叶韻問詩用叶韻得非詩本樂章播諸聲歌自然叶韻方諧律吕其音節本如是耶曰固是如此然古人文章亦多是叶韻因舉王制及老子叶韻處數段又曰周頌多不叶韻疑自有和底篇相叶清廟之瑟朱絃而疏越一唱而三歎歎即和聲也精舍朋友雜記問詩叶韻曰古人文自是有叶今泉州有詩譜紹興有韻譜皆吳才老做陸德明釋文中亦有此類甚多楊與立編語略陳埴問叶韻之義曰只要音韻相叶好吟哦諷誦易見道理亦無甚要緊今且要將七分工夫理會義理三二分工夫理會這般去處若只管留心此處而於詩之義却見不得亦何益也又曰叶韻多用吳才老本或自以意補入錢木之録又曰古人情意溫厚寬和道得言語自恁地好當時叶韻只是要便於諷詠而已到得後來一向於字韻上嚴切却無意思漢不如周魏晉不如漢唐不如魏晉本朝又不如唐如元微之劉禹錫之徒和詩猶自有韻相重處本朝和詩便定不要一字相同不知却愈壞了詩同上問詩集傳叶韻有何所據而言曰叶韻乃吳才老所作熹又續添減之蓋舊日人作詩皆押韻與今人歌曲一般今日信口讀之全失古人詠歌之意周謨録或問吳氏協韻何所據曰他皆有據泉州有其書每一字多者引十餘證少者亦兩三證他説元初更多後刪去姑存此耳然猶有未盡因言商頌天命降監下民有嚴不僭不濫不敢怠遑吳氏曰嚴字恐是莊字漢人避諱改作嚴字熹後來因讀楚辭天問見嚴字都押入剛字方字韻去又此間鄉音嚴作莊剛反乃知嚴字自與遑字叶然吳氏豈不曽看楚辭想是偶然失之又如伐木詩兄弟鬩于牆外禦其侮每有良朋蒸也無戎吳氏復疑侮當作雺以叶戎字熹却疑古人訓戎為汝如以佐戎辟戎雖小子則戎女音或通後來讀常武詩有云南仲大祖大師皇父整我六師以修我戎則戎與汝叶明矣因言古之謡諺皆押韻如夏諺之類又如散文亦有押韻者如曲禮安民哉協音兹則與上面思辭二字叶矣又如將上堂聲必揚將入户視必下下叶音護禮運孔子間居亦多押韻莊子中尤多至於易之彖辭爻辭則皆韻語也又云禮記五至三處皆叶輔廣録看詩須并叶韻讀便見得他語自整齊又更略知叶韻所由來甚善董銖録叶韻恐當以頭一韻為凖且如華字叶音敷如有女同車是第一句則第二句顔如舜華當讀作敷字然後與下文珮玉瓊琚洵美且都皆叶至如何彼穠矣唐棣之華是第一韻則當依本音讀而下文王姬之車却當作尺奢反如此方是今只從吳才老舊説不能又創得此例然楚辭紛余既有此內美兮又重之以修能能音耐然後與下文紉秋蘭以為佩叶若能字只從本音則佩字遂無音如此則又未可以頭一韻為定也李閎祖録古音能孥代叶又乃代蓋於篇首發此一端以見篇內凡韻皆叶非謂獨此字為然而他韻皆不必協也故洪本載歐陽公蘇子容孫莘老本於多艱夕替下注徐鉉云古之字音多與今異如臭亦音香艿亦音仍他皆放此蓋古今失傳不可詳究如艱與替之類亦應叶但失其傳耳夫騷韻於俗音不叶者多而三家之本獨於此字立説則是他字皆可類推而獨此為末何也黃長睿乃謂或韻或否為楚聲其考之亦不詳矣近世吳棫才老始究其説作補音補韻援據根原甚精且博而余故友黃子厚及古田蔣全甫祖其遺説亦各有所論著今皆已附于注矣讀者詳之楚辭辨證下同北斗字舊音斗為主以詩考之行葦主醹斗者為韻卷阿厚主為韻此類甚多但不知此非叶韻而舊音特出此字其説果何為耳余始讀詩得吳氏補音見其疑於殷武三章嚴遑之韻亦不能曉及讀此篇見其以嚴叶亡乃得其例余於吳氏書多所刋補皆此類今見詩集傳並同上知子之來之來音扐雜佩以贈之贈入聲此例甚多作字音佐保字音補往近王舅近音既説文作誤寫作近吳必大録字之反切其字母同者便可互用如戎汝是也逝字從折故可與害字叶韻同上詩音韻是自然如此這箇與天通古人音韻寬後人分得密後隔開了離騷注中發兩箇例在前朕皇考曰伯庸庚寅吾以降洪又重之以修能耐紉秋蘭以為佩後人不曉却謂只此兩韻如此喜有楚辭叶韻作黃子和名字刻在漳州李閎祖録因説詩音韻間有不可曉處如今所在方言亦自有音韻與古今合去處子升因問今陽字却與唐字通清字却與青字分之類亦自不可曉曰古人韻踈後世韻方嚴密見某人好考古字却説青字音自是親如此類極多錢木之録因説叶韻毛詩下民有嚴字音昂見又中庸奏格無言奏音族見反族平聲音所騣反毛詩作鬷字精舍朋友雜記鴻飛遵渚公歸無所鴻飛遵陸公歸不復飛歸協句腰亦用韻詩中亦有此體李閎祖録詩傳遺説卷六
